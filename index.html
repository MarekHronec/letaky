<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#345344">
<meta name="description" content="Akcie z letákov bez marketingovej hmly, s nákupným zoznamom do mobilu.">
<meta name="color-scheme" content="light">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/app-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/app-icon.svg">
<title>Letákový prehľad</title>
<style>
:root{
  color-scheme:light;
  --bg:#f0f1ed;--surface:#fbfbf8;--surface-2:#e9ece7;--text:#232923;--muted:#626a63;
  --line:#d8ddd6;--brand:#456b58;--brand-strong:#345344;--brand-soft:#e2e9e4;
  --green:#3c7059;--green-soft:#e3ebe6;--amber:#86632d;--amber-soft:#f2eadb;
  --red:#995151;--red-soft:#f1e3e2;--shadow:0 8px 24px rgba(35,47,38,.045);
  --metro:#52769a;--kaufland:#a95559;--lidl:#a88b2e;--tesco:#577397;--billa:#ad5558;--coop:#c2683a;--dm:#3f5b8b;--teta:#b5518a;
  --sidebar:224px;--topbar:76px;--radius:16px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;background:var(--bg);overscroll-behavior:none}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
button,input,select{font:inherit;color:inherit}
button{cursor:pointer}
a{color:var(--brand)}
.icon{width:20px;height:20px;display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex:none}
.shell{min-height:100vh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}
.sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--line);padding:25px 16px 18px;display:flex;flex-direction:column;z-index:30}
.brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--text);font-size:18px;font-weight:820;line-height:1.08;padding:0 8px 26px}
.brand-mark{width:37px;height:37px;border-radius:12px;background:var(--brand-strong);color:#fff;display:grid;place-items:center;transform:rotate(-7deg);box-shadow:0 8px 18px rgba(14,76,51,.2)}
.brand-mark .icon{width:21px;height:21px;transform:rotate(7deg)}
.side-nav{display:grid;gap:7px}
.nav-btn{border:0;background:transparent;color:var(--muted);border-radius:11px;padding:11px 12px;display:flex;align-items:center;gap:12px;text-align:left;font-weight:660;position:relative}
.nav-btn:hover{background:var(--surface-2);color:var(--text)}
.nav-btn.active{background:var(--brand-strong);color:#fff;box-shadow:0 8px 18px rgba(14,76,51,.13)}
.nav-badge{margin-left:auto;min-width:21px;height:21px;border-radius:999px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;padding:0 6px;font-size:11px;font-weight:800}
.nav-btn.active .nav-badge{background:#fff;color:var(--brand-strong)}
.side-note{margin-top:auto;border-top:1px solid var(--line);padding:16px 9px 0;color:var(--muted);font-size:11.5px}
.side-note strong{display:block;color:var(--text);margin-bottom:3px}
.workspace{min-width:0}
.topbar{position:sticky;top:0;z-index:25;min-height:var(--topbar);background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px;padding:13px clamp(18px,3vw,38px)}
.mobile-brand{display:none}
.searchbox{height:48px;display:flex;align-items:center;gap:10px;flex:1;max-width:650px;border:1px solid var(--line);background:var(--surface);border-radius:13px;padding:0 15px;box-shadow:0 2px 10px rgba(20,40,25,.025)}
.searchbox:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.searchbox .icon{color:var(--muted)}
.searchbox input{width:100%;min-width:0;border:0;outline:0;background:transparent;font-size:14.5px}
.week-select{height:48px;border:1px solid var(--line);background:var(--surface);border-radius:13px;padding:0 38px 0 13px;font-weight:650;margin-left:auto}
.header-list{height:48px;border:1px solid var(--line);background:var(--surface);border-radius:13px;padding:0 15px;display:flex;align-items:center;gap:8px;font-weight:700;white-space:nowrap}
.header-list:hover{border-color:var(--brand)}
.topbar-profile{width:44px;height:44px;flex:none;border:1px solid var(--line);background:var(--surface);border-radius:50%;display:grid;place-items:center;color:var(--muted);position:relative;padding:0}
.topbar-profile:hover{border-color:var(--brand);color:var(--brand)}
.topbar-profile.active{background:var(--brand-strong);border-color:var(--brand-strong);color:#fff}
.topbar-profile .icon{width:21px;height:21px}
.topbar-profile.logged::after{content:"";position:absolute;top:0;right:0;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--surface)}
.header-list .count{min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:11px}
.main{width:min(1390px,100%);margin:0 auto;padding:28px clamp(18px,3vw,38px) 68px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px}
.page-head.period-head{align-items:flex-start;margin-bottom:18px}
.period-head h1{font-size:clamp(29px,3.3vw,41px);margin-bottom:0}
.eyebrow{color:var(--brand);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
h1{font-size:clamp(25px,3vw,37px);line-height:1.13;letter-spacing:-.035em;margin:0 0 7px;font-weight:820}
.page-head p{margin:0;color:var(--muted);font-size:14.5px;max-width:650px}
.updated{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;white-space:nowrap;padding-bottom:3px}
.updated .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
.archive-note{background:var(--amber-soft);color:var(--amber);border:1px solid color-mix(in srgb,var(--amber) 25%,var(--line));border-radius:12px;padding:10px 13px;margin:-7px 0 18px;font-weight:650}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;display:flex;gap:13px;align-items:center;box-shadow:var(--shadow)}
.metric-icon{width:43px;height:43px;border-radius:14px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:none}
.metric.warn .metric-icon{background:var(--amber-soft);color:var(--amber)}
.metric.bad .metric-icon{background:var(--red-soft);color:var(--red)}
.metric .label{font-size:11.5px;color:var(--muted)}
.metric .value{font-size:23px;line-height:1.1;font-weight:820;font-variant-numeric:tabular-nums;margin-top:2px}
.metric .hint{font-size:10.5px;color:var(--muted);margin-top:2px}
.store-tabs{display:flex;gap:8px;overflow:auto;scrollbar-width:none;padding:2px 1px 10px;margin:0 0 6px}
.store-tabs::-webkit-scrollbar{display:none}
.store-tab{flex:none;border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:9px 15px;display:flex;align-items:center;gap:8px;font-weight:680;color:var(--muted)}
.store-tab:hover{color:var(--text);border-color:color-mix(in srgb,var(--brand) 35%,var(--line))}
.store-tab.active{background:var(--brand-strong);color:#fff;border-color:var(--brand-strong)}
.store-dot{width:10px;height:10px;border-radius:3px;background:var(--store-color,var(--brand))}
.overview-layout{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(285px,.72fr);gap:16px;align-items:start}
.column{display:grid;gap:16px;min-width:0}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-pad{padding:18px}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:15px;padding:17px 18px;border-bottom:1px solid var(--line)}
.panel-head h2,.section-head h2{font-size:16px;line-height:1.3;margin:0;font-weight:780;letter-spacing:-.01em}
.panel-head p,.section-head p{font-size:11.5px;color:var(--muted);margin:2px 0 0}
.text-btn{border:0;background:transparent;color:var(--brand);font-size:12px;font-weight:750;padding:5px;white-space:nowrap}
.deal-row{display:grid;grid-template-columns:30px minmax(0,1fr) auto auto 36px;gap:12px;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line)}
.deal-row:last-child{border-bottom:0}
.rank{color:var(--muted);font-weight:760;text-align:center}
.deal-info{min-width:0}
.deal-name{border:0;background:transparent;padding:0;text-align:left;font-weight:720;line-height:1.3;max-width:100%;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.deal-name:hover{color:var(--brand)}
.meta-line{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:4px;color:var(--muted);font-size:11px}
.validity{display:inline-flex;align-items:center;gap:4px;color:var(--muted);font-size:10.5px;font-weight:660}
.validity .icon{width:13px;height:13px}
.validity.urgent{color:var(--amber);font-weight:800}
.validity.expired{color:var(--red);font-weight:800}
.condition-note{display:inline-flex;align-items:center;width:max-content;max-width:100%;border-radius:7px;background:var(--amber-soft);color:var(--amber);padding:3px 7px;font-size:10.5px;font-weight:720;white-space:normal}
.price-sparkline{display:inline-flex;width:64px;height:21px;color:var(--green);flex:none;vertical-align:middle}
.price-sparkline svg{display:block;width:100%;height:100%;overflow:visible}
.price-sparkline polyline{fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
.price-sparkline circle{fill:currentColor}
.price-sparkline.large{width:155px;height:46px}
.history-mini{display:flex;align-items:center;justify-content:space-between;gap:16px;border-top:1px solid var(--line);padding:16px 0}
.history-mini h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 4px}
.history-mini p{font-size:11px;color:var(--muted);margin:0}
.store-logo{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:820;text-transform:uppercase;letter-spacing:.035em}
.store-logo .store-dot{width:8px;height:8px;border-radius:2px}
.deal-price{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.price-now{font-size:16px;font-weight:850;line-height:1.1}
.price-old{font-size:10.5px;color:var(--muted);text-decoration:line-through;margin-top:3px}
.discount{display:inline-flex;align-items:center;border-radius:999px;background:var(--green-soft);color:var(--green);padding:4px 8px;font-size:11px;font-weight:820;white-space:nowrap}
.discount.suspicious{background:var(--amber-soft);color:var(--amber)}
.circle-add{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--brand);display:grid;place-items:center;padding:0}
.circle-add:hover,.circle-add.in{background:var(--brand);border-color:var(--brand);color:#fff}
.circle-add .icon{width:17px;height:17px}
.promo-section{background:color-mix(in srgb,var(--brand-soft) 44%,var(--surface));border:1px solid color-mix(in srgb,var(--brand) 18%,var(--line));border-radius:var(--radius);padding:16px;margin-bottom:17px;box-shadow:var(--shadow)}
.promo-section .section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:12px}
.promo-section .section-kicker{color:var(--brand);font-size:10.5px;font-weight:820;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.promo-grid{display:flex;flex-direction:column;gap:7px}
.promo-card{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-left:4px solid var(--store-color,var(--brand));border-radius:10px;padding:9px 13px;background:var(--surface);min-width:0}
.promo-card.ended{opacity:.55}
.promo-store{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;min-width:78px;padding:5px 9px;border-radius:7px;font-size:10px;font-weight:820;text-transform:uppercase;letter-spacing:.03em;color:#fff;background:var(--store-color,var(--brand));text-align:center;line-height:1.15}
.promo-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:3px}
.promo-card strong{display:block;font-size:12.5px;line-height:1.34;font-weight:740}
.promo-card .meta{display:flex;align-items:center;gap:5px 10px;flex-wrap:wrap;color:var(--muted);font-size:10.5px}
.promo-card .meta .condition-note{padding:2px 6px;font-size:10px}
.promo-flyer-link{flex:0 0 auto;align-self:center;display:inline-flex;align-items:center;gap:4px;color:var(--muted);font-size:10.5px;font-weight:720;line-height:1.2;text-decoration:none;white-space:nowrap;border-bottom:1px solid transparent}
.promo-flyer-link .icon{width:13px;height:13px}
.promo-flyer-link:hover,.promo-flyer-link:focus-visible{color:var(--brand);border-bottom-color:currentColor}
.promo-more{display:block;width:100%;margin-top:9px;padding:8px;border:1px dashed color-mix(in srgb,var(--brand) 35%,var(--line));border-radius:9px;background:transparent;color:var(--brand);font-size:11px;font-weight:760;cursor:pointer}
.promo-more:hover{background:color-mix(in srgb,var(--brand-soft) 55%,transparent)}
.insight-card{padding:17px;background:var(--brand-soft);border-color:color-mix(in srgb,var(--brand) 20%,var(--line))}
.insight-card .icon-wrap{width:38px;height:38px;border-radius:13px;background:var(--surface);color:var(--brand);display:grid;place-items:center;margin-bottom:13px}
.insight-card h2{font-size:15px;margin:0 0 7px}
.insight-card p{margin:0;color:var(--muted);font-size:12.5px}
.insight-card strong{color:var(--text)}
.route-list{display:grid;margin-top:11px}
.route-stop{display:grid;grid-template-columns:24px minmax(0,1fr) auto;gap:9px;align-items:start;padding:9px 0;border-top:1px solid color-mix(in srgb,var(--brand) 16%,var(--line))}
.route-no{width:22px;height:22px;border-radius:50%;background:var(--surface);display:grid;place-items:center;color:var(--brand);font-size:10px;font-weight:820}
.route-stop strong{display:block;font-size:12px}.route-stop span{font-size:10.5px;color:var(--muted)}
.route-price{font-weight:760;font-size:11px;white-space:nowrap}
.primary-btn,.secondary-btn,.danger-btn{min-height:42px;border-radius:11px;padding:0 14px;font-weight:760;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.primary-btn{border:1px solid var(--brand-strong);background:var(--brand-strong);color:#fff}
.primary-btn:hover{filter:brightness(1.08)}
.secondary-btn{border:1px solid var(--line);background:var(--surface);color:var(--text)}
.secondary-btn:hover{border-color:var(--brand);color:var(--brand)}
.danger-btn{border:1px solid color-mix(in srgb,var(--red) 35%,var(--line));background:var(--red-soft);color:var(--red)}
.full{width:100%}
.source-list{display:grid;gap:8px;margin-top:11px}.source-row{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted)}
.source-ok{width:7px;height:7px;border-radius:50%;background:var(--green)}
.catalog-toolbar{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:15px;box-shadow:var(--shadow)}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-row+.filter-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.chip{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:11.5px;font-weight:690;white-space:nowrap}
.chip.active{background:var(--brand-soft);color:var(--brand);border-color:color-mix(in srgb,var(--brand) 35%,var(--line))}
.sort-select{margin-left:auto;min-height:36px;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:0 34px 0 10px;font-size:11.5px}
.result-count{color:var(--muted);font-size:12px;margin-right:auto}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px}
.product-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:9px;min-width:0;box-shadow:var(--shadow);position:relative;transition:border-color .15s ease,box-shadow .15s ease}
.product-card:hover{border-color:color-mix(in srgb,var(--brand) 46%,var(--line));box-shadow:0 9px 25px rgba(35,47,38,.065)}
.product-card.suspicious{background:color-mix(in srgb,var(--amber-soft) 22%,var(--surface))}
.product-card.expired{opacity:.62}
.product-card .top-badges{position:static;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 7px;background:var(--surface);box-shadow:0 3px 10px rgba(20,30,20,.08);font-size:10px;font-weight:800}
.badge.good{color:var(--green)}.badge.warn{color:var(--amber)}
.product-title{min-height:2.7em;border:0;background:transparent;padding:0;text-align:left;color:var(--text);font-weight:730;line-height:1.32;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-title:hover{color:var(--brand)}
.offer-facts{display:flex;align-items:center;gap:5px 8px;flex-wrap:wrap;min-height:24px}
.product-note{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.product-footer{display:flex;align-items:end;gap:8px;margin-top:auto}
.product-footer .deal-price{margin-right:auto;text-align:left}
.add-wide{height:36px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--brand);padding:0 10px;font-size:11px;font-weight:780;white-space:nowrap}
.add-wide:hover,.add-wide.in{background:var(--brand);border-color:var(--brand);color:#fff}
.empty-state{border:1px dashed var(--line);border-radius:var(--radius);padding:50px 20px;text-align:center;color:var(--muted);background:var(--surface)}
.status-strip{display:flex;align-items:center;gap:8px 18px;flex-wrap:wrap;border-top:1px solid var(--line);margin-top:22px;padding:14px 2px 0;color:var(--muted);font-size:11px}
.status-strip strong{color:var(--text);font-weight:750}
.status-strip .status-label{margin-right:auto;font-weight:750;color:var(--muted)}
.list-summary{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:12px;margin-bottom:16px}
.summary-main{background:var(--brand-strong);color:#fff;border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:15px}
.summary-main .cart-icon{width:48px;height:48px;border-radius:15px;background:rgba(255,255,255,.14);display:grid;place-items:center}
.summary-main .value{font-size:25px;font-weight:850;line-height:1.1}.summary-main .label{font-size:11px;opacity:.75;margin-bottom:2px}
.summary-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;box-shadow:var(--shadow)}
.summary-card .label{font-size:11px;color:var(--muted)}.summary-card .value{font-size:23px;font-weight:840;margin-top:3px}
.manual-form{display:grid;grid-template-columns:minmax(180px,1fr) 86px 150px auto;gap:8px;padding:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow)}
.manual-form input,.manual-form select{min-height:42px;border:1px solid var(--line);background:var(--surface-2);border-radius:10px;padding:0 11px;min-width:0}
.manual-form input:focus,.manual-form select:focus{outline:2px solid var(--brand-soft);border-color:var(--brand)}
.shopping-layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px;align-items:start}
.list-groups{display:grid;gap:12px}
.list-group{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.group-head{display:flex;align-items:center;gap:10px;padding:13px 15px;background:var(--surface-2);border-bottom:1px solid var(--line)}
.group-head h2{font-size:14px;margin:0}.group-head .subtotal{margin-left:auto;font-weight:800;font-variant-numeric:tabular-nums}
.list-item{display:grid;grid-template-columns:30px minmax(0,1fr) auto auto 28px;gap:10px;align-items:center;padding:11px 13px;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:0}.list-item.checked{opacity:.54}.list-item.checked .item-name{text-decoration:line-through}
.check-btn{width:25px;height:25px;border:1.5px solid var(--line);border-radius:8px;background:var(--surface);display:grid;place-items:center;color:#fff;padding:0}
.checked .check-btn{background:var(--green);border-color:var(--green)}
.item-name{font-weight:700;line-height:1.25}.item-meta{font-size:10.5px;color:var(--muted);margin-top:3px}
.qty{display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface)}

/* --- Kompaktný obrázok/piktogram vedľa textu položky --- */
.product-card{display:grid;grid-template-columns:52px minmax(0,1fr);grid-template-rows:auto auto auto auto;gap:6px 11px;align-items:start}
.product-card .product-media{grid-column:1;grid-row:1/4;width:52px;height:52px;aspect-ratio:auto}
.product-card .top-badges{grid-column:2;grid-row:1}
.product-card .product-title{grid-column:2;grid-row:2;min-height:0}
.product-card .offer-facts{grid-column:2;grid-row:3;min-height:0}
.product-card .product-footer{grid-column:1/3;grid-row:4;width:100%;margin-top:3px}
.product-media{position:relative;width:52px;height:52px;border-radius:11px;overflow:hidden;background:var(--surface-2);display:grid;place-items:center;flex:none}
.product-media img,.deal-thumb img,.detail-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff}
.product-media .ph{font-size:25px;line-height:1;opacity:.58;filter:grayscale(.15)}
.deal-thumb{position:relative;width:44px;height:44px;border-radius:10px;overflow:hidden;background:var(--surface-2);display:grid;place-items:center;flex:none}
.deal-thumb .ph{font-size:22px;line-height:1;opacity:.55}
.detail-media{position:relative;width:100%;aspect-ratio:16/10;border-radius:14px;overflow:hidden;background:var(--surface-2);display:grid;place-items:center;margin-bottom:14px}
.detail-media .ph{font-size:64px;line-height:1;opacity:.5}
@media(max-width:620px){
  .product-card{grid-template-columns:48px minmax(0,1fr);grid-template-rows:auto auto auto auto;padding:12px;gap:5px 10px}
  .product-card .product-media{grid-column:1;grid-row:1/4;width:48px;height:48px}
  .product-card .top-badges{grid-column:2;grid-row:1;justify-content:space-between}
  .product-card .top-badges .store-logo{margin-left:auto}
  .product-card .product-title{grid-column:2;grid-row:2}
  .product-card .offer-facts{grid-column:2;grid-row:3}
  .product-card .product-footer{grid-column:1/3;grid-row:4;align-self:auto;flex-direction:row;align-items:end}
  .product-card .product-footer .deal-price{margin-right:auto;text-align:left}
  .product-card .product-footer .add-wide{width:34px;padding:0;font-size:0;border-radius:50%;margin:0 0 0 auto}
}
/* --- Mikrofón (hlas) --- */
.mic-btn{min-height:42px;width:46px;border:1px solid var(--line);background:var(--surface-2);border-radius:10px;color:var(--brand);display:grid;place-items:center;padding:0;flex:none}
.mic-btn:hover{border-color:var(--brand)}
.mic-btn.listening{background:var(--red-soft);color:var(--red);border-color:color-mix(in srgb,var(--red) 40%,var(--line));animation:micpulse 1.1s ease-in-out infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--red) 30%,transparent)}50%{box-shadow:0 0 0 6px transparent}}
.manual-form .name-wrap{display:flex;gap:7px;min-width:0}
.manual-form .name-wrap input{flex:1;min-width:0}
/* --- Väčší cenový graf v detaile --- */
.price-chart{border-top:1px solid var(--line);padding:16px 0}
.price-chart h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 4px}
.price-chart .sub{font-size:11px;color:var(--muted);margin:0 0 12px}
.price-chart svg{display:block;width:100%;height:120px;overflow:visible}
.price-chart .axis{stroke:var(--line);stroke-width:1}
.price-chart .grid-line{stroke:var(--line);stroke-width:1;stroke-dasharray:2 4;opacity:.7}
.price-chart .pl{fill:none;stroke:var(--green);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.price-chart .area{fill:var(--green-soft);opacity:.6}
.price-chart .pt{fill:var(--surface);stroke:var(--green);stroke-width:2}
.price-chart .lbl{fill:var(--muted);font-size:9px;font-variant-numeric:tabular-nums}
.price-chart .val{fill:var(--text);font-size:9.5px;font-weight:700;font-variant-numeric:tabular-nums}
.price-chart .lo{fill:var(--green);font-size:9px;font-weight:700}
.price-chart-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:10.5px;color:var(--muted)}
.ref-warn{display:flex;gap:8px;align-items:flex-start;background:var(--amber-soft);color:var(--amber);border:1px solid color-mix(in srgb,var(--amber) 25%,var(--line));border-radius:10px;padding:9px 11px;margin-top:10px;font-size:11.5px;font-weight:600;line-height:1.45}
.ref-warn .icon{flex:none;width:16px;height:16px;margin-top:1px}
.ref-hint{font-size:11.5px;color:var(--muted);margin:0;line-height:1.5}
.ref-hint code{background:var(--surface-2);border-radius:5px;padding:1px 5px;font-size:11px}
/* --- Legislatíva --- */
.leg-intro{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow)}

.leg-disclaimer .icon{flex:none;width:17px;height:17px;margin-top:1px}

.leg-timeline h2{font-size:15px;margin:0 0 4px}
.leg-timeline p{font-size:11.5px;color:var(--muted);margin:0 0 12px}
.leg-deadlines{display:grid;gap:8px}
.leg-deadline{display:grid;grid-template-columns:auto minmax(0,1fr);gap:12px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 13px}
.leg-deadline.urgent{border-color:color-mix(in srgb,var(--red) 40%,var(--line))}
.leg-date{text-align:center;min-width:52px;font-variant-numeric:tabular-nums}
.leg-date b{display:block;font-size:16px;line-height:1;font-weight:840}
.leg-date span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.leg-deadline.urgent .leg-date b{color:var(--red)}
.leg-deadline .d-title{font-weight:730;font-size:12.5px}
.leg-deadline .d-sub{font-size:10.5px;color:var(--muted);margin-top:2px}
.leg-groups{display:grid;gap:14px}
.leg-group{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.leg-group-head{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--surface-2)}
.leg-group-head .leg-ic{width:38px;height:38px;border-radius:12px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:none}
.leg-group-head h2{font-size:15px;margin:0}
.leg-group-head p{font-size:11px;color:var(--muted);margin:2px 0 0}
.leg-items{display:grid}
.leg-item{padding:13px 16px;border-bottom:1px solid var(--line)}
.leg-item:last-child{border-bottom:0}
.leg-item-head{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
.leg-head-right{display:flex;align-items:center;gap:10px;flex:none}
.sev{display:inline-flex;gap:3px;align-items:center;flex:none}
.sev i{width:7px;height:7px;border-radius:50%;background:var(--line);display:block}
.sev.sev-hi i.on{background:var(--red)}
.sev.sev-mid i.on{background:var(--amber)}
.sev.sev-lo i.on{background:var(--green)}
.sev-legend{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}
.sev-legend .sev{margin:0 1px}
/* --- Profil / nastavenia --- */
.profile-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.1fr);gap:16px;align-items:start}
.prof-login{display:flex;align-items:flex-start;gap:13px}

.setting-label strong{display:block;font-size:13px;font-weight:730}

.setting.toggle input:checked::after{transform:translateX(18px)}
.opt-group{display:flex;gap:8px;flex:none}

.opt.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}

.dph-mini{display:inline-flex;gap:5px;align-items:center}

.login-err{background:var(--red-soft);color:var(--red);border:1px solid color-mix(in srgb,var(--red) 30%,var(--line));border-radius:9px;padding:8px 11px;font-size:11.5px;font-weight:600}

.leg-item.st-done{box-shadow:inset 3px 0 0 var(--green);background:color-mix(in srgb,var(--green-soft) 30%,var(--surface))}

.leg-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

.hist-row:last-child{border-bottom:0}
.hist-info{min-width:0;flex:1}

      <div class="overview-layout"><div class="column"><section class="panel"><div class="panel-head"><div><h2>Top príležitosti</h2><p>Najväčší rozdiel oproti bežnej cene</p></div><button class="text-btn" data-view="deals">Všetky akcie →</button></div>${top.map(renderDealRow).join('')||'<div class="empty-state">Pre tento obchod zatiaľ nie sú dáta.</div>'}</section></div>
      <div class="column">${best?`<section class="panel insight-card"><div class="icon-wrap">${svg('shield')}</div><h2>Praktický tip</h2><p><strong>${esc(best.name)}</strong> v ${esc(best.store)} za ${fmtPrice(finalPrice(best))}. ${esc(best.note||validityMeta(best).text+'.')}</p><button class="primary-btn full" data-action="toggle-deal" data-key="${esc(best.key)}" style="margin-top:13px">${inShopping(best)?svg('check')+' V zozname':svg('plus')+' Pridať do zoznamu'}</button></section>`:''}${renderRoute()}<section class="panel panel-pad"><h2 style="font-size:14px;margin:0">Dôveryhodnosť dát</h2><p style="font-size:11px;color:var(--muted);margin:5px 0 0">Reálna zľava porovnáva akciovú cenu s bežnou cenou, nie iba s prečiarknutou cenou z letáku.</p><div class="source-list">${sources.map(s=>`<div class="source-row"><i class="source-ok" style="${s.ok===false?'background:var(--red)':''}"></i>${esc(s.zdroj||s.source)}${s.ok===false?' – nedostupný':''}</div>`).join('')}</div></section></div></div>
      <div class="status-strip"><span class="status-label">Stav prehľadu</span><span><strong>${items.length}</strong> ponúk</span><span><strong>${real.length}</strong> reálne výhodných</span><span><strong>${ending.length}</strong> končia do 2 dní</span><span><strong>${susp.length}</strong> podozrivých</span><span><strong>${shopping.reduce((s,i)=>s+i.quantity,0)}</strong> v zozname</span></div>`}
  function filterItems(){let out=state.items.filter(i=>(state.store==='all'||i.storeId===state.store)&&(!state.query||norm(i.name+' '+i.store+' '+i.note).includes(norm(state.query))));if(state.settings.hideCard)out=out.filter(i=>!/karta|card|xtra|lidl ?plus/i.test(i.condition||''));if(state.filter==='realna')out=out.filter(i=>i.verdict==='realna');if(state.filter==='neoverene')out=out.filter(i=>i.verdict==='neoverene');if(state.filter==='umela')out=out.filter(i=>i.verdict==='umela');if(state.filter==='ending')out=out.filter(i=>{const d=daysTo(i.validTo);return d!=null&&d>=0&&d<=2});return out.sort((a,b)=>state.sort==='price'?(finalPrice(a)??Infinity)-(finalPrice(b)??Infinity):state.sort==='name'?a.name.localeCompare(b.name,'sk'):(discountOf(b)||0)-(discountOf(a)||0))}
  function cardBadges(i){const d=discountOf(i);return `<div class="top-badges"><span class="badge ${i.verdict==='umela'?'warn':'good'}">${i.verdict==='realna'?svg('check')+' Reálna':i.verdict==='umela'?svg('alert')+' Podozrivá':'Neoverená'}</span>${d!=null?`<span class="discount ${i.verdict==='umela'?'suspicious':''}">−${esc(Math.round(d))} %</span>`:''}${storeLogo(i.store)}</div>`}
  function renderProductCard(i){const price=finalPrice(i),old=oldFinalPrice(i),v=validityMeta(i);return `<article class="product-card ${i.verdict==='umela'?'suspicious':''} ${v.cls==='expired'?'expired':''}">${mediaHtml(i)}${cardBadges(i)}<button class="product-title" data-action="detail" data-key="${esc(i.key)}">${esc(i.name)}</button><div class="offer-facts">${sparklineHtml(i)}${validityHtml(i)}${i.condition?`<span class="condition-note">${esc(i.condition)}</span>`:''}${i.note?`<span class="product-note">${esc(i.note)}</span>`:''}</div><div class="product-footer"><div class="deal-price"><div class="price-now">${fmtPrice(price)}</div>${old!=null?`<div class="price-old">${fmtPrice(old)}</div>`:''}</div><button class="add-wide ${inShopping(i)?'in':''}" data-action="toggle-deal" data-key="${esc(i.key)}">${inShopping(i)?'✓ V zozname':'+ Do zoznamu'}</button></div></article>`}
  function renderDeals(){const items=filterItems();return `${pageHeader('Všetky akcie','Cena, platnosť a podmienky každej ponuky na jednom mieste.')}${renderStoreTabs()}<div class="catalog-toolbar"><div class="filter-row">${[['all','Všetko'],['realna','Reálne výhodné'],['neoverene','Neoverené'],['umela','Podozrivé'],['ending','Končí čoskoro']].map(([k,l])=>`<button class="chip ${state.filter===k?'active':''}" data-action="filter" data-filter="${k}">${l}</button>`).join('')}</div><div class="filter-row"><span class="result-count">${items.length} ${items.length===1?'položka':items.length<5?'položky':'položiek'}</span><span class="dph-mini" title="Zobrazenie cien pri Metre">${[['neplatca','s DPH'],['platca','bez DPH']].map(([v,l])=>`<button class="chip ${state.settings.dph===v?'active':''}" data-action="set-dph" data-val="${v}">${l}</button>`).join('')}</span><select class="sort-select" id="sort" aria-label="Triedenie"><option value="discount" ${state.sort==='discount'?'selected':''}>Najväčšia zľava</option><option value="price" ${state.sort==='price'?'selected':''}>Najnižšia cena</option><option value="name" ${state.sort==='name'?'selected':''}>Podľa názvu</option></select></div></div>${items.length?`<div class="catalog-grid">${items.map(renderProductCard).join('')}</div>`:`<div class="empty-state"><strong>Nič sme nenašli.</strong><br>Skús iný obchod, filter alebo výraz vo vyhľadávaní.</div>`}`}
  function listTotals(){return shopping.reduce((a,i)=>{a.count+=i.quantity;if(i.price!=null)a.total+=i.price*i.quantity;if(i.originalPrice!=null)a.savings+=(i.originalPrice-i.price)*i.quantity;if(i.checked)a.checked+=1;return a},{count:0,total:0,savings:0,checked:0})}
  function renderListItem(i){const meta=[i.amount,i.condition,i.source==='manual'?'vlastná položka':null].filter(Boolean).join(' · ');return `<div class="list-item ${i.checked?'checked':''}"><button class="check-btn" data-action="toggle-check" data-id="${esc(i.id)}" aria-label="${i.checked?'Zrušiť označenie':'Označiť ako kúpené'} ${esc(i.name)}">${i.checked?svg('check'):''}</button><div><div class="item-name">${esc(i.name)}</div><div class="item-meta">${esc(meta)}${i.source==='deal'&&i.validTo?` · ${esc(validityMeta(i).text)}`:''}</div></div><div class="qty"><button data-action="qty-down" data-id="${esc(i.id)}" aria-label="Znížiť množstvo">−</button><span>${i.quantity}</span><button data-action="qty-up" data-id="${esc(i.id)}" aria-label="Zvýšiť množstvo">+</button></div><div class="item-price">${i.price!=null?fmtPrice(i.price*i.quantity):'—'}</div><button class="remove-btn" data-action="remove-item" data-id="${esc(i.id)}" aria-label="Odstrániť ${esc(i.name)}">${svg('close')}</button></div>`}
  function groupShopping(){const m=new Map();shopping.forEach(i=>{const k=i.store||'Ostatné';if(!m.has(k))m.set(k,[]);m.get(k).push(i)});return [...m.entries()].sort(([a],[b])=>{const ai=STORE_ORDER.indexOf(storeId(a)),bi=STORE_ORDER.indexOf(storeId(b));return (ai<0?99:ai)-(bi<0?99:bi)||a.localeCompare(b,'sk')})}
  function histSection(){if(!state.savedLists.length)return '';return `<section class="panel hist-panel"><div class="panel-head"><div><h2>História nákupov</h2><p>Uložené nákupy${state.user?' · synchronizované':' · v tomto zariadení'}</p></div>${svg('cart')}</div><div class="hist-list">${state.savedLists.map(l=>`<div class="hist-row"><div class="hist-info"><div class="hist-name">${esc(l.name)}</div><div class="hist-meta">${esc(fmtDate(l.savedAt,true))} · ${(l.count||arr(l.items).length)} ks · ${fmtPrice(l.total||0)}${l.savings>0?` · ušetrené ${fmtPrice(l.savings)}`:''}</div></div><div class="hist-actions"><button class="secondary-btn" data-action="restore-list" data-id="${esc(l.id)}">Obnoviť</button><button class="remove-btn" data-action="delete-list" data-id="${esc(l.id)}" aria-label="Zmazať uložený nákup">${svg('close')}</button></div></div>`).join('')}</div></section>`}
  function renderList(){const totals=listTotals(),groups=groupShopping(),stores=sortedStores();return `${pageHeader('Môj nákupný zoznam','Pridávaj akcie aj vlastné položky, v obchode ich odškrtávaj. Zoznam si tento mobil zapamätá.')}
    <div class="list-summary"><div class="summary-main"><div class="cart-icon">${svg('cart')}</div><div><div class="label">Celkový odhad</div><div class="value">${fmtPrice(totals.total)}</div><div class="label">${totals.count} ks v zozname</div></div></div><div class="summary-card"><div class="label">Odhadovaná úspora</div><div class="value" style="color:var(--green)">${totals.savings>0?'−'+fmtPrice(totals.savings):'—'}</div></div><div class="summary-card"><div class="label">Nakúpené</div><div class="value">${totals.checked} / ${shopping.length}</div></div></div>
    <form class="manual-form" id="manual-form"><div class="name-wrap"><input id="manual-name" name="name" required maxlength="100" placeholder="Pridať položku – napíš alebo diktuj…" autocomplete="off" aria-label="Názov vlastnej položky"><button type="button" class="mic-btn" data-action="voice" aria-label="Diktovať názov položky" title="Diktovať">${svg('mic')}</button></div><input name="quantity" type="number" min="1" max="99" value="1" aria-label="Množstvo"><select name="store" aria-label="Obchod"><option value="">Ľubovoľný obchod</option>${stores.map(s=>`<option value="${esc(s.nazov||s.name||s.id)}">${esc(s.nazov||s.name||s.id)}</option>`).join('')}</select><button class="primary-btn" type="submit">${svg('plus')} Pridať</button></form>
    ${shopping.length?`<div class="shopping-layout"><div class="list-groups">${groups.map(([name,items])=>`<section class="list-group"><div class="group-head">${storeLogo(name)}<span class="subtotal">${items.some(i=>i.price!=null)?fmtPrice(items.reduce((s,i)=>s+(i.price||0)*i.quantity,0)):'—'}</span></div>${items.map(renderListItem).join('')}</section>`).join('')}</div><aside class="list-side"><section class="finish-card"><h2>${totals.checked?'Dokončiť nákup':'Tip pri nákupe'}</h2><p>${totals.checked?`${totals.checked===1?'Jednu označenú položku':totals.checked<5?totals.checked+' označené položky':totals.checked+' označených položiek'} môžeš po nákupe odstrániť. Položky zostávajú na svojom mieste.`:'Odškrtnuté položky zostanú viditeľné presne tam, kde boli.'}</p><div class="finish-actions"><button class="secondary-btn full" data-action="save-list">${svg('list')} Uložiť ako nákup</button>${totals.checked?`<button class="primary-btn full" data-action="remove-checked">${svg('check')} Odstrániť nakúpené</button><button class="secondary-btn full" data-action="uncheck-all">Ponechať a odškrtnúť všetko</button>`:''}</div></section><section class="backup-card"><h2>Preniesť zoznam</h2><p>Link otvor na telefóne; obsah zoznamu je uložený priamo v ňom.</p><div class="backup-actions"><button class="primary-btn share-btn" data-action="share">${svg('share')} Zdieľať link</button><button class="secondary-btn" data-action="export">${svg('download')} JSON</button><button class="secondary-btn" data-action="import">${svg('upload')} Import</button></div></section></aside></div>`:`<div class="empty-state"><div style="font-size:38px;margin-bottom:8px">🛒</div><strong>Zoznam je zatiaľ prázdny.</strong><br>Pridaj vlastnú položku vyššie alebo si vyber niečo vo Všetkých akciách.<br><button class="primary-btn" data-view="deals" style="margin-top:15px">Pozrieť akcie</button></div>`}${histSection()}`}
  function sevDots(n){n=Math.max(0,Math.min(5,Math.round(Number(n))||0));if(!n)return '';const lvl=n>=4?'hi':n===3?'mid':'lo';let dots='';for(let k=1;k<=5;k++)dots+=`<i class="${k<=n?'on':''}"></i>`;return `<span class="sev sev-${lvl}" title="Závažnosť ${n}/5 (dopad/pokuta)" aria-label="Závažnosť ${n} z 5">${dots}</span>`}
  function legHeader(){return `<div class="page-head period-head"><div><div class="eyebrow">Pre obchodníka</div><h1>Legislatíva a povinnosti</h1><p>Dôležité termíny, zmeny a povinnosti pre predajňu potravín a drogérie na jednom mieste.</p></div></div>`}
  function renderLegislativa(){const L=state.legData;
    if(L===null)return `${legHeader()}<div class="empty-state">Načítavam prehľad povinností…</div>`;
    if(L===false||!arr(L.kategorie).length)return `${legHeader()}<div class="empty-state"><strong>Prehľad povinností sa nepodarilo načítať.</strong><br>Skontroluj súbor <code>data/legislativa.json</code>.</div>`;
    const cats=arr(L.kategorie),activeCat=state.legCat,shown=activeCat==='all'?cats:cats.filter(c=>c.id===activeCat);
    const dphOk=x=>!x.dph||x.dph===state.settings.dph;
    const terminy=arr(L.terminy).filter(dphOk).filter(t=>{if(t.dph!=='platca'||!state.settings.dphPeriod)return true;const q=/štvrťrok|štvrťroč|kvart/i.test(t.nazov);return state.settings.dphPeriod==='stvrtrocne'?q:!q}).map(t=>({...t,d:daysTo(t.datum)})).filter(t=>t.d==null||t.d>=-7).sort((a,b)=>(a.d??1e9)-(b.d??1e9)).slice(0,8);
    const monFmt=new Intl.DateTimeFormat('sk-SK',{month:'short'});
    const timeline=terminy.length?`<section class="leg-timeline"><h2>Najbližšie termíny</h2><p>Zoradené podľa dátumu. Presné lehoty over v oficiálnych zdrojoch alebo s účtovníkom.</p><div class="leg-deadlines">${terminy.map(t=>{const dd=dateFrom(t.datum),d=t.d,urgent=d!=null&&d>=0&&d<=14,rel=d==null?'':d<0?'termín prešiel':d===0?'dnes':d===1?'zajtra':d<=31?`o ${d} dní`:'';return `<div class="leg-deadline ${urgent?'urgent':''}"><div class="leg-date"><b>${dd?dd.getDate():'—'}</b><span>${dd?esc(monFmt.format(dd).replace('.','')):''}</span></div><div><div class="d-title">${esc(t.nazov)}</div><div class="d-sub">${esc([t.detail,rel].filter(Boolean).join(' · '))}</div></div></div>`}).join('')}</div></section>`:'';
    const chips=`<div class="leg-cats"><button class="chip ${activeCat==='all'?'active':''}" data-action="leg-cat" data-cat="all">Všetko</button>${cats.map(c=>`<button class="chip ${activeCat===c.id?'active':''}" data-action="leg-cat" data-cat="${esc(c.id)}">${esc(c.nazov)}</button>`).join('')}<button class="chip leg-hide-chip ${state.legHide?'active':''}" data-action="leg-hide">${state.legHide?'Zobraziť vybavené':'Skryť vybavené'}</button></div>`;
    const groups=`<div class="leg-groups">${shown.map(c=>`<section class="leg-group"><div class="leg-group-head"><div class="leg-ic">${svg(c.ikona||'doc')}</div><div><h2>${esc(c.nazov)}</h2>${c.popis?`<p>${esc(c.popis)}</p>`:''}</div></div><div class="leg-items">${arr(c.polozky).filter(dphOk).map(p=>{const sk=c.id+':'+slug(p.nazov),st=state.legStates[sk]||'';if(state.legHide&&st)return '';return `<div class="leg-item st-${st}"><div class="leg-item-head"><h3>${esc(p.nazov)}</h3><div class="leg-head-right">${sevDots(p.zavaznost)}${safeUrl(p.zdroj)?`<a class="leg-src" href="${esc(safeUrl(p.zdroj))}" target="_blank" rel="noopener noreferrer">${esc(p.zdroj_nazov||'Zdroj')} ${svg('external')}</a>`:''}</div></div>${p.detail?`<p class="detail">${esc(p.detail)}</p>`:''}<div class="leg-tags">${p.ucinne_od?`<span class="leg-tag since">účinné od ${esc(fmtDate(p.ucinne_od,true))}</span>`:''}${p.kedy?`<span class="leg-tag when">${esc(p.kedy)}</span>`:''}${p.koho?`<span class="leg-tag who">${esc(p.koho)}</span>`:''}${p.confidence==='low'?'<span class="leg-tag conf-low">orientačné – overiť</span>':''}</div><div class="leg-actions">${[['done','Hotové'],['irrelevant','Nerelevantné'],['ignored','Ignorovať']].map(([v,l])=>`<button class="leg-st-btn ${st===v?'on '+v:''}" data-action="leg-state" data-key="${esc(sk)}" data-st="${v}">${l}</button>`).join('')}</div></div>`}).join('')}</div></section>`).join('')}</div>`;
    const intro=`<div class="leg-intro"><p>${esc(L.popis||'Prehľad hlavných povinností a termínov pre maloobchod s potravinami a drogériou v SR.')}</p><div class="leg-disclaimer">${svg('alert')}<span>${esc(L.upozornenie||'Ide o orientačný prehľad, nie právne poradenstvo. Konkrétne termíny, sadzby a povinnosti si over v oficiálnych zdrojoch alebo s účtovníkom/právnikom.')}</span></div><div class="sev-legend"><span>Guličky = závažnosť / dopad:</span> ${sevDots(1)} <span>malé (napr. platí roky)</span> · ${sevDots(5)} <span>vysoké (veľká pokuta / dopad)</span></div></div>`;
    const portaly=arr(L.portaly);
    const portalHtml=portaly.length?`<section class="leg-group" style="margin-top:14px"><div class="leg-group-head"><div class="leg-ic">${svg('external')}</div><div><h2>Kde sledovať zmeny</h2><p>Oficiálne portály a newslettre pre obchodníka</p></div></div><div class="leg-items">${portaly.map(pt=>`<div class="leg-item"><div class="leg-item-head"><h3>${safeUrl(pt.url)?`<a class="leg-src" href="${esc(safeUrl(pt.url))}" target="_blank" rel="noopener noreferrer">${esc(pt.nazov)} ${svg('external')}</a>`:esc(pt.nazov)}</h3>${pt.newsletter&&/áno/i.test(pt.newsletter)?'<span class="leg-tag who">newsletter</span>':''}</div><p class="detail">${esc(pt.co)}${pt.newsletter?` · <em>${esc(pt.newsletter)}</em>`:''}</p></div>`).join('')}</div></section>`:'';
    return `${legHeader()}${L.aktualizovane?`<div class="updated" style="margin:-8px 0 14px"><i class="dot"></i>Aktualizované ${esc(fmtDate(L.aktualizovane,true))}</div>`:''}${intro}${timeline}${chips}${groups}${activeCat==='all'?portalHtml:''}`}

  function render(){
    if(state.view==='legislativa'){app.innerHTML=renderLegislativa();updateNav();return}
    if(state.view==='profil'){app.innerHTML=renderProfil();updateNav();return}
    if(!state.data)return;app.innerHTML=state.view==='overview'?renderOverview():state.view==='deals'?renderDeals():renderList();updateNav()}
  function openDetail(item){if(!item)return;const matches=state.items.filter(x=>x.productId===item.productId).sort((a,b)=>(finalPrice(a)??Infinity)-(finalPrice(b)??Infinity));const d=discountOf(item),body=$('#sheet-body');body.innerHTML=`${mediaHtml(item,'detail')}<div class="detail-hero">${storeLogo(item.store)}<h2>${esc(item.name)}</h2><div class="detail-price">${fmtPrice(finalPrice(item))}</div>${oldFinalPrice(item)!=null?`<div class="price-old">Bežne ${fmtPrice(oldFinalPrice(item))}</div>`:''}<div style="margin-top:9px">${validityHtml(item)}</div></div><button class="primary-btn full" data-action="toggle-deal" data-key="${esc(item.key)}">${inShopping(item)?svg('check')+' V zozname':svg('plus')+' Pridať do zoznamu'}</button>${priceChart(item)}${referenceBlock(item)}<div class="detail-section"><h3>Informácie o akcii</h3>${d!=null?`<div class="detail-row"><span>${item.realDiscount!=null?'Reálna zľava':'Zľava v letáku'}</span><span>−${Math.round(d)} %</span></div>`:''}<div class="detail-row"><span>Hodnotenie</span><span>${item.verdict==='realna'?'Reálne výhodná':item.verdict==='umela'?'Podozrivá zľava':'Neoverená'}</span></div>${item.verdictReason?`<div class="detail-row"><span>Prečo</span><span style="max-width:75%">${esc(item.verdictReason)}</span></div>`:''}${item.condition?`<div class="detail-row"><span>Podmienka</span><span>${esc(item.condition)}</span></div>`:''}${item.validFrom||item.validTo?`<div class="detail-row"><span>Platnosť</span><span>${esc(validityMeta(item).text)}</span></div>`:''}${item.note?`<div class="detail-row"><span>Poznámka</span><span>${esc(item.note)}</span></div>`:''}</div>${matches.length>1?`<div class="detail-section"><h3>Porovnanie obchodov</h3>${matches.map((x,i)=>`<div class="compare-row"><div>${storeLogo(x.store)}${i===0?'<br><span style="color:var(--green)">Najlepšia cena</span>':''}<br>${validityHtml(x)}</div><strong>${fmtPrice(finalPrice(x))}</strong></div>`).join('')}</div>`:''}`;$('#modal-backdrop').classList.add('open');$('#detail-sheet').classList.add('open');$('#detail-sheet').setAttribute('aria-hidden','false');document.body.style.overflow='hidden'}
  function closeDetail(){$('#modal-backdrop').classList.remove('open');$('#detail-sheet').classList.remove('open');$('#detail-sheet').setAttribute('aria-hidden','true');document.body.style.overflow=''}
  function toggleDeal(key){const item=offerByKey(key);if(!item)return;inShopping(item)?removeDeal(item):addDeal(item);if($('#detail-sheet').classList.contains('open'))openDetail(item)}
  function encodeSharePayload(value){const bytes=new TextEncoder().encode(JSON.stringify(value));let binary='';for(let i=0;i<bytes.length;i+=32768)binary+=String.fromCharCode(...bytes.subarray(i,i+32768));return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
  function decodeSharePayload(value){const padded=value.replace(/-/g,'+').replace(/_/g,'/')+'==='.slice((value.length+3)%4);const binary=atob(padded),bytes=Uint8Array.from(binary,c=>c.charCodeAt(0));return JSON.parse(new TextDecoder().decode(bytes))}
  async function copyText(text){if(navigator.clipboard?.writeText){await navigator.clipboard.writeText(text);return}const field=document.createElement('textarea');field.value=text;field.style.position='fixed';field.style.opacity='0';document.body.appendChild(field);field.select();document.execCommand('copy');field.remove()}
  async function shareList(){try{const payload=encodeSharePayload({v:2,items:shopping}),url=location.href.split('#')[0]+'#share='+payload;if(url.length>14000){showToast('Zoznam je na link príliš dlhý – použi JSON export');return}if(navigator.share){await navigator.share({title:'Môj nákupný zoznam',text:'Otvor link a načítaj môj nákupný zoznam.',url})}else{await copyText(url);showToast('Link na zoznam je skopírovaný')}}catch(e){if(e?.name!=='AbortError')showToast('Link sa nepodarilo vytvoriť')}}
  function consumeSharedLink(){if(!location.hash.startsWith('#share='))return;state.view='list';const cleanHash=location.pathname+location.search+'#list';try{const value=location.hash.slice(7);if(value.length>20000)throw new Error();const parsed=decodeSharePayload(value),items=Array.isArray(parsed)?parsed:parsed.items;if(!Array.isArray(items)||items.length>200)throw new Error();const clean=items.map(sanitizeListItem).filter(Boolean);if(!clean.length&&items.length)throw new Error();if(shopping.length&&!confirm('V tomto zariadení už máš nákupný zoznam. Chceš ho nahradiť zoznamom z linku?')){history.replaceState(null,'',cleanHash);return}replaceShopping(clean);history.replaceState(null,'',cleanHash);showToast('Zoznam z linku je načítaný')}catch{history.replaceState(null,'',cleanHash);showToast('Link neobsahuje platný nákupný zoznam')}}
  function exportList(){const blob=new Blob([JSON.stringify({version:3,exportedAt:new Date().toISOString(),items:shopping},null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`nakupny-zoznam-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);showToast('Zoznam bol exportovaný')}
  async function importList(file){try{const parsed=JSON.parse(await file.text()),items=Array.isArray(parsed)?parsed:parsed.items;if(!Array.isArray(items))throw new Error();const clean=items.map(sanitizeListItem).filter(Boolean);if(!clean.length&&items.length)throw new Error();replaceShopping(clean);showToast('Zoznam bol importovaný')}catch{showToast('Tento súbor nie je platný zoznam')}}
  let recognition=null;
  function startVoice(btn){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast('Tento prehliadač nepodporuje hlasové zadávanie');return}
    if(recognition){try{recognition.stop()}catch{}return}
    const input=$('#manual-name');if(!input)return;
    recognition=new SR();recognition.lang='sk-SK';recognition.interimResults=true;recognition.continuous=false;recognition.maxAlternatives=1;
    btn.classList.add('listening');let finalText='';
    recognition.onresult=e=>{let interim='';for(let k=e.resultIndex;k<e.results.length;k++){const t=e.results[k][0].transcript;if(e.results[k].isFinal)finalText+=t;else interim+=t}input.value=(finalText||interim).replace(/\s+/g,' ').trim()};
    recognition.onerror=e=>{showToast(e.error==='not-allowed'||e.error==='service-not-allowed'?'Prístup k mikrofónu je zamietnutý':'Hlas sa nepodarilo zachytiť')};
    recognition.onend=()=>{btn.classList.remove('listening');recognition=null;if(input.value.trim())input.focus()};
    try{recognition.start()}catch{btn.classList.remove('listening');recognition=null}
  }
  async function load(week){state.week=week;app.innerHTML='<div class="empty-state">Načítavam aktuálne akcie…</div>';try{const path=week==='latest'?'data/latest.json':`data/archive/${encodeURIComponent(week)}.json`,res=await fetch(path+'?v='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);const normalized=normalizeData(await res.json());state.data=normalized;state.items=normalized.items;state.top=normalized.top;render()}catch(e){app.innerHTML=`<div class="empty-state"><strong>Dáta sa nepodarilo načítať.</strong><br>${esc(e.message)}<br><button class="primary-btn" id="retry" style="margin-top:14px">Skúsiť znova</button></div>`;$('#retry')?.addEventListener('click',()=>load(week))}}
  async function loadArchive(){try{const r=await fetch('data/archive/index.json',{cache:'no-store'}),weeks=await r.json();if(!Array.isArray(weeks))return;weeks.slice().sort().reverse().forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=w;$('#week').appendChild(o)})}catch{}}
  async function loadLegislativa(){try{const r=await fetch('data/legislativa.json?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);state.legData=await r.json()}catch{state.legData=false}if(state.view==='legislativa')render()}
  async function loadReference(){try{const r=await fetch('data/referencne-ceny.json?v='+Date.now(),{cache:'no-store'});if(r.ok)state.refData=await r.json()}catch{}}
  document.addEventListener('click',e=>{const view=e.target.closest('[data-view]');if(view){switchView(view.dataset.view);return}const b=e.target.closest('[data-action]');if(!b)return;const a=b.dataset.action;if(a==='store'){state.store=b.dataset.store;switchView(state.view==='overview'?'overview':'deals',false)}else if(a==='toggle-promo'){state.promoOpen=!state.promoOpen;render()}else if(a==='filter'){state.filter=b.dataset.filter;render()}else if(a==='leg-cat'){state.legCat=b.dataset.cat;render()}else if(a==='set-dph'){setSetting('dph',b.dataset.val)}else if(a==='set-dphperiod'){setSetting('dphPeriod',b.dataset.val)}else if(a==='leg-state'){setLegState(b.dataset.key,b.dataset.st)}else if(a==='leg-hide'){state.legHide=!state.legHide;render()}else if(a==='save-list'){saveCurrentList()}else if(a==='restore-list'){restoreSavedList(b.dataset.id)}else if(a==='delete-list'){deleteSavedList(b.dataset.id)}else if(a==='detail')openDetail(offerByKey(b.dataset.key));else if(a==='toggle-deal')toggleDeal(b.dataset.key);else if(a==='toggle-check'){const i=shopping.find(x=>x.id===b.dataset.id);if(i){const at=nextUpdatedAt();i.checked=!i.checked;i.checkedAt=i.checked?at:null;touchShoppingItem(i,at);saveShopping()}}else if(a==='qty-up'||a==='qty-down'){const i=shopping.find(x=>x.id===b.dataset.id);if(i){i.quantity=Math.max(1,i.quantity+(a==='qty-up'?1:-1));touchShoppingItem(i);saveShopping()}}else if(a==='remove-item'){if(deleteShoppingWhere(x=>x.id===b.dataset.id)){saveShopping();showToast('Položka odstránená')}}else if(a==='remove-checked'){if(deleteShoppingWhere(x=>x.checked)){saveShopping();showToast('Nákup dokončený')}}else if(a==='uncheck-all'){const at=nextUpdatedAt();shopping.forEach(x=>{if(x.checked){x.checked=false;x.checkedAt=null;touchShoppingItem(x,at)}});saveShopping()}else if(a==='voice')startVoice(b);else if(a==='logout')sbLogout();else if(a==='share')shareList();else if(a==='export')exportList();else if(a==='import')$('#import-file').click()});
  app.addEventListener('submit',async e=>{
    if(e.target.id==='manual-form'){e.preventDefault();const fd=new FormData(e.target),name=String(fd.get('name')||'').trim();if(!name)return;const at=nextUpdatedAt();shopping.push({id:uid(),source:'manual',offerId:'',productId:null,name,amount:null,store:String(fd.get('store')||'')||null,price:null,originalPrice:null,unitPrice:null,image:null,quantity:Math.max(1,Number(fd.get('quantity'))||1),checked:false,addedAt:at,checkedAt:null,updatedAt:at,deletedAt:null});saveShopping();showToast('Vlastná položka pridaná');return}
    if(e.target.id==='login-form'){e.preventDefault();const fd=new FormData(e.target),email=String(fd.get('email')||'').trim(),pass=String(fd.get('password')||'');if(!email||!pass)return;state.loginErr='';state.loginBusy=true;render();const{error}=await sbLogin(email,pass);state.loginBusy=false;if(error){state.loginErr=error==='Invalid login credentials'?'Nesprávny e-mail alebo heslo.':error;render()}else{state.loginErr='';showToast('Prihlásený')}}
  });
  $('#sort')?.addEventListener('change',()=>{});
  app.addEventListener('change',e=>{if(e.target.id==='sort'){state.sort=e.target.value;render()}else if(e.target.dataset&&e.target.dataset.action==='toggle-setting'){setSetting(e.target.dataset.key,e.target.checked)}});
  let searchTimer;$('#search').addEventListener('input',e=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>{state.query=e.target.value.trim();if(state.query&&state.view!=='deals')switchView('deals');else render()},120)});
  $('#week').addEventListener('change',e=>load(e.target.value));
  $('#sheet-close').addEventListener('click',closeDetail);$('#modal-backdrop').addEventListener('click',closeDetail);document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});
  $('#import-file').addEventListener('change',e=>{const f=e.target.files?.[0];if(f)importList(f);e.target.value='' });
  function handleLocationHash(){if(location.hash.startsWith('#share=')){consumeSharedLink();updateNav();if(state.data)render();return}const v=location.hash.slice(1);if(VIEWS.includes(v)&&v!==state.view){state.view=v;render();updateNav()}}
  addEventListener('hashchange',handleLocationHash);
  if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
  consumeSharedLink();updateNav();loadArchive();loadLegislativa();loadReference();load('latest');sbInit();
})();
</script>
