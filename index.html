<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Týždenný prehľad potravinových akcií — reálne vs. umelé zľavy, plán nákupu.">
<title>Letákový prehľad</title>
<style>
:root{
  --bg:#ffffff; --bg2:#f6f7f8; --text:#1b1e21; --muted:#68707a; --line:#e4e6e9;
  --link:#1a56a8; --link-c:#ffffff;
  --green:#1a7a44; --warn:#a05a00; --danger:#a8342c;
  --metro-bg:#005ca9; --metro-c:#ffffff;
  --kauf-bg:#d40b12; --kauf-c:#ffffff;
  --lidl-bg:#ffef42; --lidl-c:#12305e;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#141619; --bg2:#1d2024; --text:#e4e6e8; --muted:#969ea6; --line:#2c3136;
    --link:#7fa9e0; --link-c:#10131a;
    --green:#5cb98c; --warn:#d0a057; --danger:#dd8880;
    --metro-bg:#1668ad; --kauf-bg:#c01218; --lidl-bg:#e8dc4a;
  }
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%; scroll-behavior:smooth}
body{
  margin:0; background:var(--bg); color:var(--text);
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
a{color:var(--link)}
.wrap{max-width:860px; margin:0 auto; padding:0 16px 56px}
section{scroll-margin-top:76px}
@media (max-width:680px){ section{scroll-margin-top:132px} }

/* ---------- horná lišta ---------- */
.topbar{position:sticky; top:0; z-index:30; background:var(--bg); border-bottom:1px solid var(--line)}
.topbar .inner{max-width:860px; margin:0 auto; padding:10px 16px; display:flex; flex-wrap:wrap; align-items:center; gap:8px 18px}
.brand{font-weight:700; font-size:16px; color:var(--text); text-decoration:none; letter-spacing:.2px}
nav.menu{display:flex; gap:2px; overflow-x:auto; scrollbar-width:none}
nav.menu::-webkit-scrollbar{display:none}
nav.menu a{
  padding:5px 10px; font-size:13.5px; color:var(--muted); text-decoration:none;
  border-radius:6px; white-space:nowrap;
}
nav.menu a:hover{color:var(--text); background:var(--bg2)}
.top-tools{margin-left:auto; display:flex; align-items:center; gap:8px}
input[type=search],select{
  background:var(--bg); color:var(--text); border:1px solid var(--line);
  border-radius:7px; padding:6px 10px; font:inherit; font-size:13.5px;
}
input[type=search]{width:190px}
@media (max-width:680px){
  nav.menu{order:3; width:100%; margin:0 -16px; padding:0 16px}
  .top-tools{margin-left:auto}
  input[type=search]{width:130px}
}

/* ---------- typografia sekcií ---------- */
h1{font-size:21px; margin:22px 0 2px; font-weight:700}
.gen{font-size:12.5px; color:var(--muted); margin-bottom:18px}
h2{
  font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;
  color:var(--muted); margin:34px 0 12px; padding-bottom:6px; border-bottom:1px solid var(--line);
}
.arch-note{
  border:1px solid var(--line); border-left:3px solid var(--warn); border-radius:8px;
  background:var(--bg2); color:var(--warn); font-size:13.5px; padding:9px 12px; margin:14px 0 0;
}

/* ---------- tag obchodu ---------- */
.tag{
  display:inline-block; font-size:11px; font-weight:700; letter-spacing:.4px;
  border-radius:5px; padding:2px 8px; text-transform:uppercase; vertical-align:middle;
}
.tag.metro{background:var(--metro-bg); color:var(--metro-c)}
.tag.kaufland{background:var(--kauf-bg); color:var(--kauf-c)}
.tag.lidl{background:var(--lidl-bg); color:var(--lidl-c)}
.tag.other{background:var(--bg2); color:var(--muted); border:1px solid var(--line)}

/* ---------- promo ---------- */
.promo-list{display:grid; gap:10px}
.promo{
  border:1px solid var(--line); border-left:3px solid var(--line);
  border-radius:8px; padding:12px 14px; background:var(--bg);
}
.promo.metro{border-left-color:var(--metro-bg)}
.promo.kaufland{border-left-color:var(--kauf-bg)}
.promo.lidl{border-left-color:var(--lidl-bg)}
.promo .txt{font-weight:600; font-size:15.5px; margin:6px 0 3px; line-height:1.35}
.promo .meta{font-size:12.5px; color:var(--muted)}
.promo .last{color:var(--warn); font-weight:700}
.promo .ended-tag{color:var(--muted); font-weight:700}
.promo.ended{opacity:.5}

/* ---------- top týždňa ---------- */
.top-grid{display:grid; gap:10px; grid-template-columns:1fr}
@media (min-width:600px){.top-grid{grid-template-columns:1fr 1fr}}
.tcard{border:1px solid var(--line); border-radius:8px; padding:11px 13px; background:var(--bg)}
.tcard.umela{opacity:.5}
.tcard .nm{font-weight:600; font-size:14.5px; margin:6px 0 4px; line-height:1.3}
.prices{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap}
.p-now{font-size:18px; font-weight:700; font-variant-numeric:tabular-nums}
.p-old{color:var(--muted); text-decoration:line-through; font-size:12.5px; font-variant-numeric:tabular-nums}
.p-pct{font-size:12.5px; font-weight:700; color:var(--muted)}
.realna .p-pct{color:var(--green)}
.tcard .meta,.item .meta{font-size:12px; color:var(--muted); margin-top:3px}
.meta .vd-umela{color:var(--danger)}
.meta .vd-urgent{color:var(--warn); font-weight:600}

/* ---------- obchody ---------- */
.shop-head{display:flex; align-items:center; gap:10px; margin:34px 0 4px}
.shop-head h2{margin:0; padding:0; border:none; flex:1; display:flex; align-items:center; gap:10px}
.shop-head .cnt{font-size:12px; color:var(--muted); font-weight:400; text-transform:none; letter-spacing:0}
.shop-head a{font-size:13px; white-space:nowrap}
.shop-note{font-size:12.5px; color:var(--muted); margin:0 0 4px}
.shop-sec{border-bottom:1px solid var(--line); padding-bottom:8px}
.items{list-style:none; margin:0; padding:0}
.item{display:flex; gap:14px; padding:10px 0; border-top:1px solid var(--line); align-items:baseline}
.item:first-child{border-top:none}
.item.umela{opacity:.5}
.item .mid{flex:1; min-width:0}
.item .nm{font-weight:600; font-size:14.5px; line-height:1.35}
.item .price{text-align:right; white-space:nowrap}
.item .p-now{font-size:15.5px}
.item .p-sub{display:block; font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums}
.empty{padding:14px 0; font-size:13px; color:var(--muted); font-style:italic}

/* ---------- lišta filtrov ---------- */
.filterbar{
  display:flex; align-items:center; gap:4px; flex-wrap:wrap;
  margin:26px 0 0; font-size:13.5px;
}
.filterbar .lbl{color:var(--muted); margin-right:4px}
.fbtn{
  border:none; background:none; color:var(--muted); font:inherit; font-size:13.5px;
  padding:5px 9px; border-radius:6px; cursor:pointer; white-space:nowrap;
}
.fbtn:hover{color:var(--text); background:var(--bg2)}
.fbtn.active{color:var(--text); background:var(--bg2); font-weight:600}
.filterbar select{margin-left:auto}
.match-info{font-size:12px; color:var(--muted); margin-top:4px}

/* ---------- plán nákupu ---------- */
.plan .stop{display:flex; gap:14px; padding:11px 0; border-top:1px solid var(--line); align-items:flex-start}
.plan .stop:first-child{border-top:none}
.plan .no{
  flex:0 0 24px; height:24px; border-radius:50%; background:var(--bg2); color:var(--muted);
  border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:12px; margin-top:1px;
}
.plan .nm{font-weight:600; font-size:14.5px}
.plan .meta{font-size:12.5px; color:var(--muted); margin-top:1px}
.plan .eur{margin-left:auto; font-weight:600; font-variant-numeric:tabular-nums; white-space:nowrap}
.plan-sum{
  display:flex; flex-wrap:wrap; gap:8px 20px; align-items:center;
  border-top:1px solid var(--line); padding-top:14px; margin-top:2px;
}
.plan-sum .tot{font-weight:700}
.plan-sum .sav{color:var(--green); font-weight:600}
.maps-btn{
  margin-left:auto; background:var(--link); color:var(--link-c); text-decoration:none;
  font-weight:600; border-radius:7px; padding:8px 16px; font-size:13.5px; display:inline-block;
}
.maps-btn:active{opacity:.85}

/* ---------- pätička ---------- */
footer.site{border-top:1px solid var(--line); margin-top:44px; padding-top:16px; font-size:12.5px; color:var(--muted)}
.src-list{display:flex; flex-wrap:wrap; gap:4px 18px; margin-bottom:12px}
.src{display:flex; align-items:center; gap:6px}
.dot{width:7px; height:7px; border-radius:50%; display:inline-block}
.dot.ok{background:var(--green)} .dot.fail{background:var(--danger)}
.legend p{margin:3px 0}

/* ---------- stavy ---------- */
.msg{border:1px solid var(--line); border-radius:8px; padding:22px 16px; text-align:center; color:var(--muted); margin:36px 0}
.msg.err{border-color:var(--danger); color:var(--danger)}
.retry{margin-top:12px}
.retry button{background:var(--link); color:var(--link-c); border:none; border-radius:7px; padding:8px 16px; font:inherit; font-weight:600; cursor:pointer}
</style>
</head>
<body>

<div class="topbar">
  <div class="inner">
    <a class="brand" href="#">Letákový prehľad</a>
    <nav class="menu" id="menu"></nav>
    <span class="top-tools">
      <input type="search" id="q" placeholder="Hľadať položku…" aria-label="Hľadať položku">
      <select id="arch-sel" aria-label="Výber týždňa"><option value="latest">Aktuálny týždeň</option></select>
    </span>
  </div>
</div>

<div class="wrap">
  <main id="app"><div class="msg">Načítavam dáta…</div></main>
  <footer class="site" id="foot"></footer>
</div>

<script>
'use strict';
(function(){
  /* ================= stav ================= */
  const state = { data:null, week:'latest', filter:'vsetko', search:'', sort:'default' };

  const KONCI_DNI = 2;      // filter „Končí čoskoro“: plati_do do 2 dní
  const POSLEDNE_DNI = 3;   // promo „posledné dni“: plati_do do 3 dní
  const PORADIE_OBCHODOV = ['metro','kaufland','lidl'];

  /* ================= pomocníci ================= */
  const $ = s => document.querySelector(s);
  function el(tag, cls, text){
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }
  const eurFmt = new Intl.NumberFormat('sk-SK', {style:'currency', currency:'EUR'});
  const fmtEur = n => (typeof n === 'number' && isFinite(n)) ? eurFmt.format(n) : '';
  function parseDen(s){
    if (typeof s !== 'string') return null;
    const d = new Date(s + 'T00:00:00');
    return isNaN(d) ? null : d;
  }
  function dniDo(s){
    const d = parseDen(s);
    if (!d) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    return Math.round((d - today) / 86400000);
  }
  function fmtDen(s){
    const d = parseDen(s);
    return d ? d.getDate() + '. ' + (d.getMonth()+1) + '.' : '';
  }
  const norm = s => (s||'').toLocaleLowerCase('sk');
  const isArr = a => Array.isArray(a) && a.length > 0;

  function shopKey(o){
    const n = norm((o && (o.id || o.nazov)) || '');
    for (const k of PORADIE_OBCHODOV) if (n.includes(k)) return k;
    return 'other';
  }
  const shopKeyFromName = n => shopKey({id:n});
  function shopTag(name){
    return el('span','tag ' + shopKeyFromName(name), name || '');
  }
  function zoradeneObchody(obchody){
    return obchody.slice().sort((a,b)=>{
      const ia = PORADIE_OBCHODOV.indexOf(shopKey(a)), ib = PORADIE_OBCHODOV.indexOf(shopKey(b));
      return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
    });
  }

  /* ================= filtrovanie / triedenie ================= */
  function passes(item){
    if (state.search && !norm(item.nazov).includes(norm(state.search))) return false;
    switch (state.filter){
      case 'realne': return item.verdikt === 'realna';
      case 'umele':  return item.verdikt === 'umela';
      case 'konci': {
        const d = dniDo(item.plati_do);
        return d !== null && d >= 0 && d <= KONCI_DNI;
      }
      default: return true;
    }
  }
  function sorted(items){
    const arr = items.slice();
    if (state.sort === 'zlava') arr.sort((a,b)=>(b.zlava_pct||0)-(a.zlava_pct||0));
    else if (state.sort === 'cena') arr.sort((a,b)=>(a.cena??Infinity)-(b.cena??Infinity));
    else if (state.sort === 'nazov') arr.sort((a,b)=>(a.nazov||'').localeCompare(b.nazov||'','sk'));
    return arr;
  }

  /* ================= meta riadok položky ================= */
  function metaRiadok(it, extra){
    const meta = el('div','meta');
    const add = (node, sep) => {
      if (meta.childNodes.length && sep !== false) meta.appendChild(document.createTextNode(' · '));
      meta.appendChild(node);
    };
    if (it.verdikt === 'umela') add(el('span','vd-umela','umelá zľava'));
    else if (it.verdikt === 'neoverene') add(el('span', null, 'neoverené'));
    if (it.podmienka) add(document.createTextNode(it.podmienka));
    if (it.plati_do){
      const d = dniDo(it.plati_do);
      const urgent = d !== null && d >= 0 && d <= KONCI_DNI;
      add(el('span', urgent ? 'vd-urgent' : null, 'do ' + fmtDen(it.plati_do)));
    }
    if (it.poznamka) add(document.createTextNode(it.poznamka));
    if (extra) add(extra);
    return meta.childNodes.length ? meta : null;
  }

  /* ================= render: hlavička týždňa ================= */
  function renderWeekHead(d){
    const frag = document.createDocumentFragment();
    const w = [d.tyzden, d.obdobie].filter(Boolean).join(' · ');
    frag.appendChild(el('h1', null, w || 'Prehľad akcií'));
    let gen = '';
    if (d.generovane){
      const g = new Date(d.generovane);
      if (!isNaN(g)) gen = 'generované ' + new Intl.DateTimeFormat('sk-SK',
        {day:'numeric', month:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'}).format(g);
    }
    if (gen) frag.appendChild(el('div','gen', gen));
    if (state.week !== 'latest'){
      frag.appendChild(el('div','arch-note','Prezeráš archívny týždeň ' + state.week + ' — akcie už nemusia platiť.'));
    }
    return frag;
  }

  /* ================= render: promo ================= */
  function renderPromo(promo){
    if (!isArr(promo)) return null;
    const sec = el('section'); sec.id = 'promo';
    sec.appendChild(el('h2', null, 'Promo akcie'));
    const list = el('div','promo-list');
    for (const p of promo){
      const card = el('div','promo ' + shopKeyFromName(p.obchod));
      if (p.obchod) card.appendChild(shopTag(p.obchod));
      card.appendChild(el('div','txt', p.text || ''));
      const meta = el('div','meta');
      const parts = [];
      const d = dniDo(p.plati_do);
      if (d !== null && d < 0){
        card.classList.add('ended');
        parts.push(el('span','ended-tag','skončilo'));
      } else if (d !== null && d <= POSLEDNE_DNI){
        parts.push(el('span','last','posledné dni'));
      }
      if (p.plati_do) parts.push(document.createTextNode('platí do ' + fmtDen(p.plati_do)));
      if (p.podmienka) parts.push(document.createTextNode(p.podmienka));
      parts.forEach((n,i)=>{
        if (i) meta.appendChild(document.createTextNode(' · '));
        meta.appendChild(n);
      });
      if (meta.childNodes.length) card.appendChild(meta);
      list.appendChild(card);
    }
    sec.appendChild(list);
    return sec;
  }

  /* ================= render: top týždňa ================= */
  function renderTop(top){
    if (!isArr(top)) return null;
    const sec = el('section'); sec.id = 'top';
    sec.appendChild(el('h2', null, 'Top týždňa'));
    const grid = el('div','top-grid');
    for (const t of top){
      const c = el('div','tcard ' + (t.verdikt || ''));
      if (t.obchod) c.appendChild(shopTag(t.obchod));
      c.appendChild(el('div','nm', t.nazov || ''));
      const pr = el('div','prices');
      pr.appendChild(el('span','p-now', fmtEur(t.cena)));
      if (t.cena_povodna != null) pr.appendChild(el('span','p-old', fmtEur(t.cena_povodna)));
      if (t.zlava_pct != null) pr.appendChild(el('span','p-pct','−' + t.zlava_pct + ' %'));
      c.appendChild(pr);
      const m = metaRiadok(t);
      if (m) c.appendChild(m);
      grid.appendChild(c);
    }
    sec.appendChild(grid);
    return sec;
  }

  /* ================= render: filtre ================= */
  function renderFilterbar(){
    const bar = el('div','filterbar');
    bar.appendChild(el('span','lbl','Zobraziť:'));
    const defs = [['vsetko','Všetko'],['realne','Reálne zľavy'],['umele','Umelé'],['konci','Končí čoskoro']];
    for (const [key,label] of defs){
      const b = el('button','fbtn' + (state.filter === key ? ' active' : ''), label);
      b.type = 'button';
      b.addEventListener('click', ()=>{
        state.filter = key;
        bar.querySelectorAll('.fbtn').forEach(x=>x.classList.toggle('active', x === b));
        rerenderShops();
      });
      bar.appendChild(b);
    }
    const sel = el('select');
    sel.setAttribute('aria-label','Triedenie');
    [['default','Poradie v letáku'],['zlava','Najväčšia zľava'],['cena','Najnižšia cena'],['nazov','Podľa názvu']]
      .forEach(([v,t])=>{ const o = el('option', null, t); o.value = v; if (v === state.sort) o.selected = true; sel.appendChild(o); });
    sel.addEventListener('change', e=>{ state.sort = e.target.value; rerenderShops(); });
    bar.appendChild(sel);
    return bar;
  }

  /* ================= render: obchody ================= */
  function renderItem(it){
    const li = el('li','item ' + (it.verdikt || ''));
    const mid = el('div','mid');
    mid.appendChild(el('div','nm', it.nazov || ''));
    const m = metaRiadok(it);
    if (m) mid.appendChild(m);
    li.appendChild(mid);

    const price = el('div','price ' + (it.verdikt || ''));
    const pr = el('div','prices');
    if (it.zlava_pct != null) pr.appendChild(el('span','p-pct','−' + it.zlava_pct + ' %'));
    if (it.cena_povodna != null) pr.appendChild(el('span','p-old', fmtEur(it.cena_povodna)));
    pr.appendChild(el('span','p-now', fmtEur(it.cena)));
    price.appendChild(pr);
    if (it.cena_s_dph != null){
      price.appendChild(el('span','p-sub','bez DPH · ' + fmtEur(it.cena_s_dph) + ' s DPH'));
    }
    li.appendChild(price);
    return li;
  }

  function renderShops(obchody){
    if (!isArr(obchody)) return null;
    const box = el('div'); box.id = 'shops';
    box.appendChild(renderFilterbar());
    const info = el('div','match-info'); box.appendChild(info);
    let shown = 0, total = 0;

    for (const o of zoradeneObchody(obchody)){
      const sec = el('section','shop-sec');
      sec.id = 'obchod-' + (o.id || shopKey(o));
      const head = el('div','shop-head');
      const h = el('h2');
      h.appendChild(shopTag(o.nazov || o.id || 'Obchod'));
      const all = Array.isArray(o.polozky) ? o.polozky : [];
      const vis = sorted(all.filter(passes));
      total += all.length; shown += vis.length;
      h.appendChild(el('span','cnt', vis.length + ' / ' + all.length + ' položiek'));
      head.appendChild(h);
      if (o.letak_url){
        const a = el('a', null, 'leták ↗');
        a.href = o.letak_url; a.target = '_blank'; a.rel = 'noopener';
        head.appendChild(a);
      }
      sec.appendChild(head);
      if (o.poznamka) sec.appendChild(el('p','shop-note', o.poznamka));
      if (vis.length){
        const ul = el('ul','items');
        for (const it of vis) ul.appendChild(renderItem(it));
        sec.appendChild(ul);
      } else {
        sec.appendChild(el('div','empty','Žiadna položka nezodpovedá filtru.'));
      }
      box.appendChild(sec);
    }
    info.textContent = (state.filter !== 'vsetko' || state.search)
      ? 'Zobrazených ' + shown + ' z ' + total + ' položiek'
      : '';
    return box;
  }

  /* ================= render: plán ================= */
  function renderPlan(plan){
    if (!plan || !isArr(plan.zastavky)) return null;
    const sec = el('section','plan'); sec.id = 'plan';
    sec.appendChild(el('h2', null, 'Plán nákupu'));
    for (const z of plan.zastavky){
      const s = el('div','stop');
      s.appendChild(el('span','no', String(z.poradie ?? '·')));
      const mid = el('div');
      mid.appendChild(el('div','nm', z.nazov || ''));
      const meta = [];
      if (z.den) meta.push(z.den);
      if (z.poznamka) meta.push(z.poznamka);
      if (meta.length) mid.appendChild(el('div','meta', meta.join(' — ')));
      s.appendChild(mid);
      if (z.odhad_eur != null) s.appendChild(el('span','eur','~' + fmtEur(z.odhad_eur)));
      sec.appendChild(s);
    }
    const sum = el('div','plan-sum');
    if (plan.spolu_eur != null) sum.appendChild(el('span','tot','Spolu ~' + fmtEur(plan.spolu_eur)));
    if (plan.uspora_eur != null) sum.appendChild(el('span','sav','úspora ' + fmtEur(plan.uspora_eur)));
    if (plan.maps_url){
      const a = el('a','maps-btn','Otvoriť trasu v Mapách');
      a.href = plan.maps_url; a.target = '_blank'; a.rel = 'noopener';
      sum.appendChild(a);
    }
    if (sum.childNodes.length) sec.appendChild(sum);
    return sec;
  }

  /* ================= render: pätička ================= */
  function renderFoot(d){
    const f = $('#foot'); f.textContent = '';
    if (isArr(d.zdroje_stav)){
      const list = el('div','src-list');
      list.appendChild(el('strong', null, 'Zdroje:'));
      for (const z of d.zdroje_stav){
        const s = el('span','src');
        s.appendChild(el('span','dot ' + (z.ok ? 'ok' : 'fail')));
        s.appendChild(el('span', null, (z.zdroj || '?') + (z.ok ? '' : ' (nedostupný)')));
        list.appendChild(s);
      }
      f.appendChild(list);
    }
    const lg = el('div','legend');
    [
      'Reálna zľava = cena je skutočne nižšia než bežná predajná cena.',
      'Umelá zľava (vyblednuté položky) = „pôvodná“ cena je nadsadená alebo sa akcia stále opakuje.',
      'Neoverené = chýba cenová história na posúdenie.',
      'Metro: ceny bez DPH, cena s DPH je uvedená pod cenou.',
      '„Končí čoskoro“ = akcia platí už len ' + KONCI_DNI + ' dni alebo menej.'
    ].forEach(t => lg.appendChild(el('p', null, t)));
    f.appendChild(lg);
  }

  /* ================= menu ================= */
  function renderMenu(d){
    const m = $('#menu'); m.textContent = '';
    const add = (href, label) => { const a = el('a', null, label); a.href = href; m.appendChild(a); };
    if (isArr(d.promo)) add('#promo','Promo');
    if (isArr(d.top)) add('#top','Top týždňa');
    if (isArr(d.obchody)){
      for (const o of zoradeneObchody(d.obchody)){
        add('#obchod-' + (o.id || shopKey(o)), o.nazov || o.id || 'Obchod');
      }
    }
    if (d.plan && isArr(d.plan.zastavky)) add('#plan','Plán nákupu');
  }

  /* ================= hlavný render ================= */
  function renderAll(){
    const d = state.data;
    const app = $('#app'); app.textContent = '';
    if (!d){ app.appendChild(el('div','msg','Žiadne dáta.')); return; }
    renderMenu(d);
    app.appendChild(renderWeekHead(d));
    for (const s of [renderPromo(d.promo), renderTop(d.top), renderShops(d.obchody), renderPlan(d.plan)]){
      if (s) app.appendChild(s);
    }
    renderFoot(d);
  }
  function rerenderShops(){
    const old = document.getElementById('shops');
    const fresh = state.data ? renderShops(state.data.obchody) : null;
    if (old && fresh) old.replaceWith(fresh);
    else if (old && !fresh) old.remove();
  }

  /* ================= načítanie dát ================= */
  function showError(msg){
    const app = $('#app'); app.textContent = '';
    const box = el('div','msg err');
    box.appendChild(el('div', null, msg));
    const r = el('div','retry');
    const b = el('button', null, 'Skúsiť znova');
    b.addEventListener('click', () => load(state.week));
    r.appendChild(b); box.appendChild(r);
    app.appendChild(box);
  }
  async function load(week){
    state.week = week;
    $('#app').textContent = '';
    $('#app').appendChild(el('div','msg','Načítavam dáta…'));
    const url = week === 'latest'
      ? 'data/latest.json'
      : 'data/archive/' + encodeURIComponent(week) + '.json';
    try{
      const res = await fetch(url + '?t=' + Date.now(), {cache:'no-store'});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      state.data = await res.json();
      renderAll();
    }catch(e){
      showError('Dáta sa nepodarilo načítať (' + url + ' — ' + e.message + '). Skús to o chvíľu, alebo skontroluj pripojenie.');
    }
  }
  async function loadArchiveIndex(){
    try{
      const res = await fetch('data/archive/index.json?t=' + Date.now(), {cache:'no-store'});
      if (!res.ok) return;
      const weeks = await res.json();
      if (!Array.isArray(weeks)) return;
      const sel = $('#arch-sel');
      weeks.slice().sort().reverse().forEach(w => {
        if (typeof w !== 'string') return;
        const o = el('option', null, w); o.value = w;
        sel.appendChild(o);
      });
    }catch(e){ /* archív je voliteľný */ }
  }

  /* ================= udalosti ================= */
  $('#arch-sel').addEventListener('change', e => load(e.target.value));
  let qT;
  $('#q').addEventListener('input', e => {
    clearTimeout(qT);
    qT = setTimeout(() => { state.search = e.target.value.trim(); rerenderShops(); }, 150);
  });

  /* ================= štart ================= */
  loadArchiveIndex();
  load('latest');
})();
</script>
</body>
</html>
