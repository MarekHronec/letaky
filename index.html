<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#345344">
<meta name="description" content="Akcie z letákov bez marketingovej hmly, s nákupným zoznamom do mobilu.">
<meta name="color-scheme" content="light">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/app-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/app-icon.svg">
<title>Letákový prehľad</title>
<style>
:root{
  color-scheme:light;
  --bg:#f0f1ed;--surface:#fbfbf8;--surface-2:#e9ece7;--text:#232923;--muted:#626a63;
  --line:#d8ddd6;--brand:#456b58;--brand-strong:#345344;--brand-soft:#e2e9e4;
  --green:#3c7059;--green-soft:#e3ebe6;--amber:#86632d;--amber-soft:#f2eadb;
  --red:#995151;--red-soft:#f1e3e2;--shadow:0 8px 24px rgba(35,47,38,.045);
  --metro:#52769a;--kaufland:#a95559;--lidl:#a88b2e;--tesco:#577397;--billa:#ad5558;
  --sidebar:224px;--topbar:76px;--radius:16px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
button,input,select{font:inherit;color:inherit}
button{cursor:pointer}
a{color:var(--brand)}
.icon{width:20px;height:20px;display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex:none}
.shell{min-height:100vh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}
.sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--line);padding:25px 16px 18px;display:flex;flex-direction:column;z-index:30}
.brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--text);font-size:18px;font-weight:820;line-height:1.08;padding:0 8px 26px}
.brand-mark{width:37px;height:37px;border-radius:12px;background:var(--brand-strong);color:#fff;display:grid;place-items:center;transform:rotate(-7deg);box-shadow:0 8px 18px rgba(14,76,51,.2)}
.brand-mark .icon{width:21px;height:21px;transform:rotate(7deg)}
.side-nav{display:grid;gap:7px}
.nav-btn{border:0;background:transparent;color:var(--muted);border-radius:11px;padding:11px 12px;display:flex;align-items:center;gap:12px;text-align:left;font-weight:660;position:relative}
.nav-btn:hover{background:var(--surface-2);color:var(--text)}
.nav-btn.active{background:var(--brand-strong);color:#fff;box-shadow:0 8px 18px rgba(14,76,51,.13)}
.nav-badge{margin-left:auto;min-width:21px;height:21px;border-radius:999px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;padding:0 6px;font-size:11px;font-weight:800}
.nav-btn.active .nav-badge{background:#fff;color:var(--brand-strong)}
.side-note{margin-top:auto;border-top:1px solid var(--line);padding:16px 9px 0;color:var(--muted);font-size:11.5px}
.side-note strong{display:block;color:var(--text);margin-bottom:3px}
.workspace{min-width:0}
.topbar{position:sticky;top:0;z-index:25;min-height:var(--topbar);background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px;padding:13px clamp(18px,3vw,38px)}
.mobile-brand{display:none}
.searchbox{height:48px;display:flex;align-items:center;gap:10px;flex:1;max-width:650px;border:1px solid var(--line);background:var(--surface);border-radius:13px;padding:0 15px;box-shadow:0 2px 10px rgba(20,40,25,.025)}
.searchbox:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.searchbox .icon{color:var(--muted)}
.searchbox input{width:100%;min-width:0;border:0;outline:0;background:transparent;font-size:14.5px}
.week-select{height:48px;border:1px solid var(--line);background:var(--surface);border-radius:13px;padding:0 38px 0 13px;font-weight:650}
.header-list{height:48px;border:1px solid var(--line);background:var(--surface);border-radius:13px;padding:0 15px;display:flex;align-items:center;gap:8px;font-weight:700;white-space:nowrap}
.header-list:hover{border-color:var(--brand)}
.header-list .count{min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:11px}
.main{width:min(1390px,100%);margin:0 auto;padding:28px clamp(18px,3vw,38px) 68px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px}
.page-head.period-head{align-items:flex-start;margin-bottom:18px}
.period-head h1{font-size:clamp(29px,3.3vw,41px);margin-bottom:0}
.eyebrow{color:var(--brand);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
h1{font-size:clamp(25px,3vw,37px);line-height:1.13;letter-spacing:-.035em;margin:0 0 7px;font-weight:820}
.page-head p{margin:0;color:var(--muted);font-size:14.5px;max-width:650px}
.updated{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;white-space:nowrap;padding-bottom:3px}
.updated .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
.archive-note{background:var(--amber-soft);color:var(--amber);border:1px solid color-mix(in srgb,var(--amber) 25%,var(--line));border-radius:12px;padding:10px 13px;margin:-7px 0 18px;font-weight:650}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;display:flex;gap:13px;align-items:center;box-shadow:var(--shadow)}
.metric-icon{width:43px;height:43px;border-radius:14px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:none}
.metric.warn .metric-icon{background:var(--amber-soft);color:var(--amber)}
.metric.bad .metric-icon{background:var(--red-soft);color:var(--red)}
.metric .label{font-size:11.5px;color:var(--muted)}
.metric .value{font-size:23px;line-height:1.1;font-weight:820;font-variant-numeric:tabular-nums;margin-top:2px}
.metric .hint{font-size:10.5px;color:var(--muted);margin-top:2px}
.store-tabs{display:flex;gap:8px;overflow:auto;scrollbar-width:none;padding:2px 1px 10px;margin:0 0 6px}
.store-tabs::-webkit-scrollbar{display:none}
.store-tab{flex:none;border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:9px 15px;display:flex;align-items:center;gap:8px;font-weight:680;color:var(--muted)}
.store-tab:hover{color:var(--text);border-color:color-mix(in srgb,var(--brand) 35%,var(--line))}
.store-tab.active{background:var(--brand-strong);color:#fff;border-color:var(--brand-strong)}
.store-dot{width:10px;height:10px;border-radius:3px;background:var(--store-color,var(--brand))}
.overview-layout{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(285px,.72fr);gap:16px;align-items:start}
.column{display:grid;gap:16px;min-width:0}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-pad{padding:18px}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:15px;padding:17px 18px;border-bottom:1px solid var(--line)}
.panel-head h2,.section-head h2{font-size:16px;line-height:1.3;margin:0;font-weight:780;letter-spacing:-.01em}
.panel-head p,.section-head p{font-size:11.5px;color:var(--muted);margin:2px 0 0}
.text-btn{border:0;background:transparent;color:var(--brand);font-size:12px;font-weight:750;padding:5px;white-space:nowrap}
.deal-row{display:grid;grid-template-columns:30px minmax(0,1fr) auto auto 36px;gap:12px;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line)}
.deal-row:last-child{border-bottom:0}
.rank{color:var(--muted);font-weight:760;text-align:center}
.deal-info{min-width:0}
.deal-name{border:0;background:transparent;padding:0;text-align:left;font-weight:720;line-height:1.3;max-width:100%;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.deal-name:hover{color:var(--brand)}
.meta-line{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:4px;color:var(--muted);font-size:11px}
.validity{display:inline-flex;align-items:center;gap:4px;color:var(--muted);font-size:10.5px;font-weight:660}
.validity .icon{width:13px;height:13px}
.validity.urgent{color:var(--amber);font-weight:800}
.validity.expired{color:var(--red);font-weight:800}
.condition-note{display:inline-flex;align-items:center;width:max-content;max-width:100%;border-radius:7px;background:var(--amber-soft);color:var(--amber);padding:3px 7px;font-size:10.5px;font-weight:720;white-space:normal}
.price-sparkline{display:inline-flex;width:64px;height:21px;color:var(--green);flex:none;vertical-align:middle}
.price-sparkline svg{display:block;width:100%;height:100%;overflow:visible}
.price-sparkline polyline{fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
.price-sparkline circle{fill:currentColor}
.price-sparkline.large{width:155px;height:46px}
.history-mini{display:flex;align-items:center;justify-content:space-between;gap:16px;border-top:1px solid var(--line);padding:16px 0}
.history-mini h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 4px}
.history-mini p{font-size:11px;color:var(--muted);margin:0}
.store-logo{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:820;text-transform:uppercase;letter-spacing:.035em}
.store-logo .store-dot{width:8px;height:8px;border-radius:2px}
.deal-price{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.price-now{font-size:16px;font-weight:850;line-height:1.1}
.price-old{font-size:10.5px;color:var(--muted);text-decoration:line-through;margin-top:3px}
.discount{display:inline-flex;align-items:center;border-radius:999px;background:var(--green-soft);color:var(--green);padding:4px 8px;font-size:11px;font-weight:820;white-space:nowrap}
.discount.suspicious{background:var(--amber-soft);color:var(--amber)}
.circle-add{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--brand);display:grid;place-items:center;padding:0}
.circle-add:hover,.circle-add.in{background:var(--brand);border-color:var(--brand);color:#fff}
.circle-add .icon{width:17px;height:17px}
.promo-section{background:color-mix(in srgb,var(--brand-soft) 44%,var(--surface));border:1px solid color-mix(in srgb,var(--brand) 18%,var(--line));border-radius:var(--radius);padding:16px;margin-bottom:17px;box-shadow:var(--shadow)}
.promo-section .section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:12px}
.promo-section .section-kicker{color:var(--brand);font-size:10.5px;font-weight:820;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.promo-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.promo-card{border:1px solid var(--line);border-left:3px solid var(--store-color,var(--brand));border-radius:12px;padding:12px 13px;background:var(--surface);min-width:0}
.promo-card.ended{opacity:.55}
.promo-card-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.promo-flyer-link{display:inline-flex;align-items:center;gap:4px;color:var(--muted);font-size:10.5px;font-weight:720;line-height:1.2;text-decoration:none;white-space:nowrap;border-bottom:1px solid transparent}
.promo-flyer-link .icon{width:13px;height:13px}
.promo-flyer-link:hover,.promo-flyer-link:focus-visible{color:var(--brand);border-bottom-color:currentColor}
.promo-card strong{display:block;font-size:12.5px;line-height:1.38;margin:7px 0 6px}
.promo-card .meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:var(--muted);font-size:10.5px}
.promo-card .meta .condition-note{padding:2px 6px;font-size:10px}
.insight-card{padding:17px;background:var(--brand-soft);border-color:color-mix(in srgb,var(--brand) 20%,var(--line))}
.insight-card .icon-wrap{width:38px;height:38px;border-radius:13px;background:var(--surface);color:var(--brand);display:grid;place-items:center;margin-bottom:13px}
.insight-card h2{font-size:15px;margin:0 0 7px}
.insight-card p{margin:0;color:var(--muted);font-size:12.5px}
.insight-card strong{color:var(--text)}
.route-list{display:grid;margin-top:11px}
.route-stop{display:grid;grid-template-columns:24px minmax(0,1fr) auto;gap:9px;align-items:start;padding:9px 0;border-top:1px solid color-mix(in srgb,var(--brand) 16%,var(--line))}
.route-no{width:22px;height:22px;border-radius:50%;background:var(--surface);display:grid;place-items:center;color:var(--brand);font-size:10px;font-weight:820}
.route-stop strong{display:block;font-size:12px}.route-stop span{font-size:10.5px;color:var(--muted)}
.route-price{font-weight:760;font-size:11px;white-space:nowrap}
.primary-btn,.secondary-btn,.danger-btn{min-height:42px;border-radius:11px;padding:0 14px;font-weight:760;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.primary-btn{border:1px solid var(--brand-strong);background:var(--brand-strong);color:#fff}
.primary-btn:hover{filter:brightness(1.08)}
.secondary-btn{border:1px solid var(--line);background:var(--surface);color:var(--text)}
.secondary-btn:hover{border-color:var(--brand);color:var(--brand)}
.danger-btn{border:1px solid color-mix(in srgb,var(--red) 35%,var(--line));background:var(--red-soft);color:var(--red)}
.full{width:100%}
.source-list{display:grid;gap:8px;margin-top:11px}.source-row{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted)}
.source-ok{width:7px;height:7px;border-radius:50%;background:var(--green)}
.catalog-toolbar{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:15px;box-shadow:var(--shadow)}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-row+.filter-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.chip{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:11.5px;font-weight:690;white-space:nowrap}
.chip.active{background:var(--brand-soft);color:var(--brand);border-color:color-mix(in srgb,var(--brand) 35%,var(--line))}
.sort-select{margin-left:auto;min-height:36px;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:0 34px 0 10px;font-size:11.5px}
.result-count{color:var(--muted);font-size:12px;margin-right:auto}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px}
.product-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:9px;min-width:0;box-shadow:var(--shadow);position:relative;transition:border-color .15s ease,box-shadow .15s ease}
.product-card:hover{border-color:color-mix(in srgb,var(--brand) 46%,var(--line));box-shadow:0 9px 25px rgba(35,47,38,.065)}
.product-card.suspicious{background:color-mix(in srgb,var(--amber-soft) 22%,var(--surface))}
.product-card.expired{opacity:.62}
.product-card .top-badges{position:static;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 7px;background:var(--surface);box-shadow:0 3px 10px rgba(20,30,20,.08);font-size:10px;font-weight:800}
.badge.good{color:var(--green)}.badge.warn{color:var(--amber)}
.product-title{min-height:2.7em;border:0;background:transparent;padding:0;text-align:left;color:var(--text);font-weight:730;line-height:1.32;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-title:hover{color:var(--brand)}
.offer-facts{display:flex;align-items:center;gap:5px 8px;flex-wrap:wrap;min-height:24px}
.product-note{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.product-footer{display:flex;align-items:end;gap:8px;margin-top:auto}
.product-footer .deal-price{margin-right:auto;text-align:left}
.add-wide{height:36px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--brand);padding:0 10px;font-size:11px;font-weight:780;white-space:nowrap}
.add-wide:hover,.add-wide.in{background:var(--brand);border-color:var(--brand);color:#fff}
.empty-state{border:1px dashed var(--line);border-radius:var(--radius);padding:50px 20px;text-align:center;color:var(--muted);background:var(--surface)}
.status-strip{display:flex;align-items:center;gap:8px 18px;flex-wrap:wrap;border-top:1px solid var(--line);margin-top:22px;padding:14px 2px 0;color:var(--muted);font-size:11px}
.status-strip strong{color:var(--text);font-weight:750}
.status-strip .status-label{margin-right:auto;font-weight:750;color:var(--muted)}
.list-summary{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:12px;margin-bottom:16px}
.summary-main{background:var(--brand-strong);color:#fff;border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:15px}
.summary-main .cart-icon{width:48px;height:48px;border-radius:15px;background:rgba(255,255,255,.14);display:grid;place-items:center}
.summary-main .value{font-size:25px;font-weight:850;line-height:1.1}.summary-main .label{font-size:11px;opacity:.75;margin-bottom:2px}
.summary-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;box-shadow:var(--shadow)}
.summary-card .label{font-size:11px;color:var(--muted)}.summary-card .value{font-size:23px;font-weight:840;margin-top:3px}
.manual-form{display:grid;grid-template-columns:minmax(180px,1fr) 86px 150px auto;gap:8px;padding:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow)}
.manual-form input,.manual-form select{min-height:42px;border:1px solid var(--line);background:var(--surface-2);border-radius:10px;padding:0 11px;min-width:0}
.manual-form input:focus,.manual-form select:focus{outline:2px solid var(--brand-soft);border-color:var(--brand)}
.shopping-layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px;align-items:start}
.list-groups{display:grid;gap:12px}
.list-group{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.group-head{display:flex;align-items:center;gap:10px;padding:13px 15px;background:var(--surface-2);border-bottom:1px solid var(--line)}
.group-head h2{font-size:14px;margin:0}.group-head .subtotal{margin-left:auto;font-weight:800;font-variant-numeric:tabular-nums}
.list-item{display:grid;grid-template-columns:30px minmax(0,1fr) auto auto 28px;gap:10px;align-items:center;padding:11px 13px;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:0}.list-item.checked{opacity:.54}.list-item.checked .item-name{text-decoration:line-through}
.check-btn{width:25px;height:25px;border:1.5px solid var(--line);border-radius:8px;background:var(--surface);display:grid;place-items:center;color:#fff;padding:0}
.checked .check-btn{background:var(--green);border-color:var(--green)}
.item-name{font-weight:700;line-height:1.25}.item-meta{font-size:10.5px;color:var(--muted);margin-top:3px}
.qty{display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface)}
.qty button{width:28px;height:30px;border:0;background:transparent;color:var(--muted);padding:0}.qty button:hover{background:var(--surface-2);color:var(--text)}
.qty span{min-width:25px;text-align:center;font-size:11px;font-weight:760}
.item-price{min-width:58px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums}.remove-btn{border:0;background:transparent;color:var(--muted);padding:5px}.remove-btn:hover{color:var(--red)}
.list-side{display:grid;gap:12px;position:sticky;top:calc(var(--topbar) + 14px)}
.finish-card{background:var(--brand-soft);border:1px solid color-mix(in srgb,var(--brand) 24%,var(--line));border-radius:var(--radius);padding:16px}
.finish-card h2{font-size:15px;margin:0 0 5px}.finish-card p{font-size:11.5px;color:var(--muted);margin:0 0 13px}
.finish-actions{display:grid;gap:8px}
.backup-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}.backup-card h2{font-size:14px;margin:0 0 5px}.backup-card p{font-size:11px;color:var(--muted);margin:0 0 11px}.backup-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}.backup-actions button{font-size:11px}.backup-actions .share-btn{grid-column:1/-1}
.bottom-nav{display:none}
.modal-backdrop{position:fixed;inset:0;background:rgba(8,15,10,.54);z-index:60;opacity:0;pointer-events:none;transition:.18s}
.modal-backdrop.open{opacity:1;pointer-events:auto}

@media(max-width:1120px){.metric-grid{grid-template-columns:repeat(2,1fr)}.overview-layout{grid-template-columns:1fr}.overview-layout>.column:last-child{grid-template-columns:repeat(3,1fr)}.shopping-layout{grid-template-columns:1fr}.list-side{position:static;grid-template-columns:1fr 1fr}.promo-grid{grid-template-columns:repeat(2,1fr)}}

  :root{--topbar:118px}.shell{display:block}.sidebar{display:none}.topbar{padding:9px 14px;min-height:auto;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:9px}.mobile-brand{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:820}.mobile-brand .brand-mark{width:31px;height:31px;border-radius:10px}.mobile-brand .brand-mark .icon{width:18px;height:18px}.week-select{height:40px;max-width:155px}.searchbox{grid-column:1/-1;grid-row:2;height:43px;max-width:none}.header-list{display:none}.main{padding:20px 14px calc(92px + env(safe-area-inset-bottom))}.bottom-nav{position:fixed;z-index:45;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(3,1fr);background:color-mix(in srgb,var(--surface) 94%,transparent);border-top:1px solid var(--line);padding:7px 8px calc(7px + env(safe-area-inset-bottom));backdrop-filter:blur(16px)}.bottom-nav .nav-btn{border-radius:12px;padding:7px 4px;display:flex;flex-direction:column;gap:3px;justify-content:center;font-size:10px;text-align:center}.bottom-nav .nav-btn .icon{width:21px;height:21px}.bottom-nav .nav-btn.active{background:var(--brand-soft);color:var(--brand);box-shadow:none}.bottom-nav .nav-badge{position:absolute;top:2px;left:calc(50% + 8px);min-width:18px;height:18px;background:var(--red);color:#fff;border:2px solid var(--surface);padding:0 4px}.overview-layout>.column:last-child{grid-template-columns:1fr}.page-head{align-items:flex-start}.updated{display:none}.catalog-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.list-summary{grid-template-columns:1.3fr 1fr}.list-summary .summary-card:last-child{display:none}.manual-form{grid-template-columns:minmax(0,1fr) 78px}.manual-form select{grid-column:1/2}.manual-form button{grid-column:2}.list-side{grid-template-columns:1fr 1fr}.toast{bottom:calc(83px + env(safe-area-inset-bottom))}
}
@media(max-width:620px){
  h1{font-size:26px}.period-head h1{font-size:30px}.page-head{margin-bottom:17px}.page-head p{font-size:13px}.metric-grid{display:flex;overflow:auto;scrollbar-width:none;margin:0 -14px 15px;padding:0 14px 2px}.metric{min-width:155px;padding:13px}.metric-icon{width:37px;height:37px}.metric .value{font-size:20px}.store-tabs{margin-right:-14px}.deal-row{grid-template-columns:minmax(0,1fr) auto 36px;padding:11px 12px;gap:10px}.deal-row .rank,.deal-row .discount{display:none}.promo-section{margin-left:-2px;margin-right:-2px;padding:14px}.promo-section .section-head{align-items:flex-start}.promo-grid{display:flex;overflow:auto;margin-right:-14px;padding-right:14px;scrollbar-width:none}.promo-card{min-width:250px}.catalog-toolbar{padding:11px}.filter-row{overflow:auto;flex-wrap:nowrap;scrollbar-width:none}.filter-row+.filter-row{overflow:visible;flex-wrap:wrap}.sort-select{margin-left:0;flex:1}.catalog-grid{display:grid;grid-template-columns:1fr;gap:9px}.product-card{display:grid;grid-template-columns:minmax(0,1fr) auto;grid-template-rows:auto auto auto;padding:14px;gap:6px 12px}.product-card .top-badges{grid-column:1/3;grid-row:1;justify-content:flex-start;gap:8px}.product-card .top-badges .store-logo{margin-left:auto}.product-title{grid-column:1;grid-row:2;min-height:auto;-webkit-line-clamp:2}.offer-facts{grid-column:1;grid-row:3;min-height:0}.product-note{white-space:normal}.product-footer{grid-column:2;grid-row:2/4;align-self:end;flex-direction:column;align-items:flex-end}.product-footer .deal-price{margin-right:0;text-align:right}.product-footer .add-wide{width:34px;padding:0;font-size:0;border-radius:50%;margin-left:auto;margin-top:5px}.product-footer .add-wide::after{content:'+';font-size:19px}.product-footer .add-wide.in::after{content:'✓';font-size:14px}.status-strip{gap:6px 12px}.status-strip .status-label{width:100%;margin-right:0}.list-summary{grid-template-columns:1fr 1fr}.summary-main{padding:14px;gap:10px}.summary-main .cart-icon{display:none}.summary-main .value,.summary-card .value{font-size:21px}.summary-card{padding:14px}.shopping-layout{display:block}.list-side{grid-template-columns:1fr;margin-top:12px}.list-item{grid-template-columns:28px minmax(0,1fr) auto 26px;gap:8px;padding:11px}.list-item .qty{grid-column:2;justify-self:start;margin-top:2px}.list-item .item-price{grid-column:3;grid-row:1/3;align-self:center}.list-item .remove-btn{grid-column:4;grid-row:1/3}.detail-sheet{top:auto;height:min(88vh,760px);border-left:0;border-top:1px solid var(--line);border-radius:22px 22px 0 0;transform:translateY(103%)}.detail-sheet.open{transform:none}.detail-sheet .sheet-body{padding:16px}.history-mini{align-items:flex-start}.price-sparkline.large{width:130px}
}

<body>
<div class="shell">
  <aside class="sidebar">
    <a class="brand" href="#overview" aria-label="Letákový prehľad – domov"><span class="brand-mark" data-icon="tag"></span><span>Letákový<br>prehľad</span></a>
    <nav class="side-nav" aria-label="Hlavná navigácia">
      <button class="nav-btn" data-view="overview"><span data-icon="home"></span>Prehľad</button>
      <button class="nav-btn" data-view="deals"><span data-icon="tag"></span>Všetky akcie</button>
      <button class="nav-btn" data-view="list"><span data-icon="list"></span>Môj zoznam <span class="nav-badge list-count" hidden>0</span></button>
    </nav>
    <div class="side-note"><strong>Bez účtu a bez cookies</strong>Zoznam zostáva bezpečne uložený iba v tomto zariadení.</div>
  </aside>
  <div class="workspace">
    <header class="topbar">
      <div class="mobile-brand"><span class="brand-mark" data-icon="tag"></span>Letákový prehľad</div>
      <label class="searchbox"><span data-icon="search"></span><span class="sr-only">Hľadať produkt alebo obchod</span><input id="search" type="search" placeholder="Hľadať produkt alebo obchod…" autocomplete="off"></label>
      <select class="week-select" id="week" aria-label="Výber týždňa"><option value="latest">Tento týždeň</option></select>
      <button class="header-list" type="button" data-view="list"><span data-icon="list"></span>Môj zoznam <span class="count list-count">0</span></button>
    </header>
    <main class="main" id="app"><div class="empty-state">Načítavam aktuálne akcie…</div></main>
  </div>
</div>
<nav class="bottom-nav" aria-label="Mobilná navigácia">
  <button class="nav-btn" data-view="overview"><span data-icon="home"></span>Prehľad</button>
  <button class="nav-btn" data-view="deals"><span data-icon="tag"></span>Akcie</button>
  <button class="nav-btn" data-view="list"><span data-icon="list"></span>Zoznam <span class="nav-badge list-count" hidden>0</span></button>
</nav>
<div class="modal-backdrop" id="modal-backdrop"></div>
<aside class="detail-sheet" id="detail-sheet" role="dialog" aria-modal="true" aria-label="Detail produktu" aria-hidden="true">
  <div class="sheet-head"><span data-icon="tag"></span><strong>Detail akcie</strong><button class="sheet-close" id="sheet-close" aria-label="Zavrieť detail"><span data-icon="close"></span></button></div>
  <div class="sheet-body" id="sheet-body"></div>
</aside>
<input hidden id="import-file" type="file" accept="application/json,.json">
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
'use strict';
(()=>{
  const ICONS={
    tag:'<path d="M20 13 13 20a2 2 0 0 1-2.8 0L3 12.8V4h8.8L20 12a1.4 1.4 0 0 1 0 1Z"/><circle cx="7.5" cy="8.5" r="1.2"/>',
    home:'<path d="m3 11 9-7 9 7"/><path d="M5.5 10v10h13V10M9.5 20v-6h5v6"/>',
    search:'<circle cx="10.5" cy="10.5" r="6.5"/><path d="m16 16 4.5 4.5"/>',
    list:'<path d="M9 6h11M9 12h11M9 18h11"/><path d="m4 6 .8.8L6.5 5M4 12l.8.8L6.5 11M4 18l.8.8 1.7-1.8"/>',
    check:'<path d="m5 12 4.2 4L19 6.5"/>',plus:'<path d="M12 5v14M5 12h14"/>',minus:'<path d="M5 12h14"/>',
    close:'<path d="m6 6 12 12M18 6 6 18"/>',cart:'<circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/><path d="M3 4h2l2.4 10.5a2 2 0 0 0 2 1.5H18a2 2 0 0 0 2-1.6l1-6.4H6"/>',
    shield:'<path d="M12 3 20 6v6c0 5-3.4 8-8 9-4.6-1-8-4-8-9V6l8-3Z"/><path d="m8.5 12 2.2 2.2 4.8-5"/>',
    clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',alert:'<path d="M10.3 4.2 2.5 18a2 2 0 0 0 1.8 3h15.4a2 2 0 0 0 1.8-3L13.7 4.2a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/>',
    upload:'<path d="M12 16V4m0 0L7 9m5-5 5 5"/><path d="M4 15v5h16v-5"/>',download:'<path d="M12 4v12m0 0 5-5m-5 5-5-5"/><path d="M4 20h16"/>',share:'<circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/><path d="m8.2 10.8 7.6-4.5M8.2 13.2l7.6 4.5"/>',
    external:'<path d="M14 4h6v6M20 4l-9 9"/><path d="M18 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h6"/>'
  };
  function svg(name,cls='icon'){return `<svg class="${cls}" viewBox="0 0 24 24" aria-hidden="true">${ICONS[name]||ICONS.tag}</svg>`}
  document.querySelectorAll('[data-icon]').forEach(n=>n.innerHTML=svg(n.dataset.icon));

  const $=s=>document.querySelector(s); const app=$('#app');
  const STORE_ORDER=['metro','kaufland','lidl','tesco','billa'];
  const STORE_COLORS={metro:'var(--metro)',kaufland:'var(--kaufland)',lidl:'var(--lidl)',tesco:'var(--tesco)',billa:'var(--billa)',other:'var(--brand)'};
  const LIST_KEY='letaky.shoppingList.v2',OLD_LIST_KEY='letaky-zoznam';
  const state={data:null,items:[],top:[],week:'latest',view:['overview','deals','list'].includes(location.hash.slice(1))?location.hash.slice(1):'overview',store:'all',filter:'all',sort:'discount',query:'',finishOpen:false};
  let shopping=loadShoppingList(),toastTimer;
  const eur=new Intl.NumberFormat('sk-SK',{style:'currency',currency:'EUR'});
  const fmtPrice=n=>Number.isFinite(Number(n))?eur.format(Number(n)):'';
  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const norm=s=>String(s??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  const slug=s=>norm(s).replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,80)||'polozka';
  const uid=()=>globalThis.crypto?.randomUUID?.()||Date.now().toString(36)+Math.random().toString(36).slice(2);
  const safeUrl=u=>{if(!u)return '';try{const x=new URL(u,location.href);return ['http:','https:'].includes(x.protocol)?x.href:''}catch{return ''}};
  const arr=a=>Array.isArray(a)?a:[];
  function dateFrom(s){if(!s)return null;const d=new Date(String(s).length===10?s+'T00:00:00':s);return Number.isNaN(+d)?null:d}
  function daysTo(s){const d=dateFrom(s);if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)}
  function fmtDate(s,withYear=false){const d=dateFrom(s);return d?new Intl.DateTimeFormat('sk-SK',withYear?{day:'numeric',month:'numeric',year:'numeric'}:{day:'numeric',month:'numeric'}).format(d):''}
  function storeId(s){const n=norm(s);return STORE_ORDER.find(k=>n.includes(k))||slug(n||'other')}
  function storeStyle(s){return `--store-color:${STORE_COLORS[storeId(s)]||'var(--brand)'}`}
  function storeLogo(name){return `<span class="store-logo" style="${storeStyle(name)}"><i class="store-dot"></i>${esc(name||'Ostatné')}</span>`}
  function extractAmount(name){return String(name||'').match(/\b\d+(?:[,.]\d+)?\s?(?:kg|g|l|ml|ks)\b/i)?.[0]||''}
  function normalizeItem(raw,store){
    const name=raw.nazov||raw.name||'Položka',storeName=raw.obchod||raw.store||store?.nazov||store?.name||'Ostatné',sid=store?.id||storeId(storeName);
    const productId=raw.product_id||raw.productId||slug(name),id=raw.id||raw.offer_id||`${sid}-${productId}`;
    return {raw,id:String(id),key:`${sid}|${id}`,productId:String(productId),name,amount:raw.mnozstvo||raw.amount||extractAmount(name),store:storeName,storeId:sid,
      price:num(raw.cena??raw.price),priceVat:num(raw.cena_s_dph??raw.price_with_vat),oldPrice:num(raw.cena_povodna??raw.original_price),oldPriceVat:num(raw.cena_povodna_s_dph??raw.original_price_with_vat),
      flyerDiscount:num(raw.zlava_letak_pct??raw.flyer_discount_pct??raw.zlava_pct??raw.discount_pct),realDiscount:num(raw.zlava_realna_pct??raw.real_discount_pct),verdict:raw.verdikt||raw.verdict||'neoverene',
      condition:raw.podmienka||raw.condition||'',validFrom:raw.plati_od||raw.valid_from||store?.plati_od||store?.valid_from||'',validTo:raw.plati_do||raw.valid_to||store?.plati_do||store?.valid_to||'',note:raw.poznamka||raw.note||'',image:raw.obrazok_url||raw.image_url||raw.image||'',unitPrice:raw.jednotkova_cena??raw.unit_price??null,unit:raw.jednotka||raw.unit||'',history:arr(raw.historia_cien||raw.price_history)};
  }
  function num(v){const n=Number(v);return Number.isFinite(n)?n:null}
  function normalizeData(raw){
    const stores=arr(raw.obchody||raw.stores);const items=[];
    stores.forEach(store=>arr(store.polozky||store.items).forEach(x=>items.push(normalizeItem(x,store))));
    const byExact=new Map(items.map(i=>[norm(i.store)+'|'+norm(i.name),i]));
    const top=arr(raw.top).map(x=>typeof x==='string'?items.find(i=>i.id===x):Object.assign({},normalizeItem(x,null),byExact.get(norm(x.obchod||x.store)+'|'+norm(x.nazov||x.name))||{})).filter(Boolean);
    arr(raw.top_ids||raw.top_offer_ids).forEach(id=>{const x=items.find(i=>i.id===id);if(x&&!top.some(t=>t.key===x.key))top.push(x)});
    return {raw,stores,items,top:top.length?top:items.filter(i=>i.verdict==='realna').sort((a,b)=>(discountOf(b)||0)-(discountOf(a)||0)).slice(0,6)};
  }
  function discountOf(i){return i.realDiscount??i.flyerDiscount}
  function finalPrice(i){return i.priceVat??i.price}
  function oldFinalPrice(i){return i.oldPriceVat??(i.priceVat!=null?null:i.oldPrice)}
  function offerByKey(key){return state.items.find(i=>i.key===key)||state.top.find(i=>i.key===key)}
  function sortedStores(){return state.data.stores.slice().sort((a,b)=>{const ai=STORE_ORDER.indexOf(storeId(a.id||a.nazov)),bi=STORE_ORDER.indexOf(storeId(b.id||b.nazov));return (ai<0?99:ai)-(bi<0?99:bi)})}
  function loadShoppingList(){
    try{const v=JSON.parse(localStorage.getItem(LIST_KEY)||'null');if(Array.isArray(v))return v.map(sanitizeListItem).filter(Boolean)}catch{}
    try{const old=JSON.parse(localStorage.getItem(OLD_LIST_KEY)||'null');if(Array.isArray(old)){const migrated=old.map(x=>sanitizeListItem({id:uid(),source:'deal',offerId:(x.obchod||'')+'|'+(x.nazov||''),productId:slug(x.nazov),name:x.nazov,store:x.obchod,price:x.cena_s_dph??x.cena,quantity:1,checked:false,addedAt:new Date().toISOString()})).filter(Boolean);localStorage.setItem(LIST_KEY,JSON.stringify(migrated));return migrated}}catch{}
    return [];
  }
  function sanitizeListItem(x){if(!x||!String(x.name||x.nazov||'').trim())return null;return {id:String(x.id||uid()),source:x.source==='manual'?'manual':'deal',offerId:x.offerId||x.offer_id||'',productId:x.productId||x.product_id||null,name:String(x.name||x.nazov).trim(),amount:x.amount||null,store:x.store||x.obchod||null,price:num(x.price??x.cena),originalPrice:num(x.originalPrice??x.original_price),unitPrice:x.unitPrice??null,condition:x.condition||x.podmienka||'',validFrom:x.validFrom||x.plati_od||'',validTo:x.validTo||x.plati_do||'',quantity:Math.max(1,Number(x.quantity)||1),checked:Boolean(x.checked),addedAt:x.addedAt||new Date().toISOString(),checkedAt:x.checkedAt||null}}
  function saveShopping(){try{localStorage.setItem(LIST_KEY,JSON.stringify(shopping))}catch{}updateNav();if(state.view==='list')render();}
  function addDeal(item){const found=shopping.find(x=>x.source==='deal'&&x.offerId===item.key&&!x.checked);if(found)found.quantity+=1;else shopping.push({id:uid(),source:'deal',offerId:item.key,productId:item.productId,name:item.name,amount:item.amount||null,store:item.store,price:finalPrice(item),originalPrice:oldFinalPrice(item),unitPrice:item.unitPrice,condition:item.condition,validFrom:item.validFrom,validTo:item.validTo,quantity:1,checked:false,addedAt:new Date().toISOString(),checkedAt:null});persistOnly();showToast(found?'Zvýšené množstvo v zozname':'Pridané do nákupného zoznamu')}
  function removeDeal(item){const before=shopping.length;shopping=shopping.filter(x=>!(x.source==='deal'&&x.offerId===item.key&&!x.checked));if(shopping.length!==before){persistOnly();showToast('Odstránené zo zoznamu')}}
  function persistOnly(){try{localStorage.setItem(LIST_KEY,JSON.stringify(shopping))}catch{}updateNav();render()}
  function inShopping(item){return shopping.some(x=>x.source==='deal'&&x.offerId===item.key&&!x.checked)}
  function showToast(text){const t=$('#toast');t.textContent=text;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2100)}
  function updateNav(){document.querySelectorAll('.list-count').forEach(x=>{x.textContent=shopping.filter(i=>!i.checked).reduce((s,i)=>s+i.quantity,0);x.hidden=shopping.length===0});document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('active',x.dataset.view===state.view))}
  function switchView(view,hash=true){if(!['overview','deals','list'].includes(view))return;state.view=view;state.finishOpen=false;if(hash&&location.hash.slice(1)!==view)history.pushState(null,'','#'+view);updateNav();render();scrollTo({top:0,behavior:'smooth'})}
  function pageHeader(title,desc){const raw=state.data.raw;return `<div class="page-head"><div><div class="eyebrow">${esc(raw.obdobie||raw.tyzden||'Aktuálny týždeň')}</div><h1>${esc(title)}</h1>${desc?`<p>${esc(desc)}</p>`:''}</div></div>${state.week!=='latest'?`<div class="archive-note">Prezeráš archív ${esc(state.week)}. Tieto akcie už nemusia platiť.</div>`:''}`}
  function overviewHeader(){const raw=state.data.raw;return `<div class="page-head period-head"><div><div class="eyebrow">Prehľad zliav</div><h1>${esc(raw.obdobie||raw.tyzden||'Aktuálne obdobie')}</h1></div></div>${state.week!=='latest'?`<div class="archive-note">Prezeráš archív ${esc(state.week)}. Tieto akcie už nemusia platiť.</div>`:''}`}
  function metric(icon,label,value,hint,cls=''){return `<div class="metric ${cls}"><div class="metric-icon">${svg(icon)}</div><div><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div><div class="hint">${esc(hint||'')}</div></div></div>`}
  function renderStoreTabs(target='filter'){const stores=sortedStores();return `<div class="store-tabs"><button class="store-tab ${state.store==='all'?'active':''}" data-action="store" data-store="all">Všetky obchody</button>${stores.map(s=>{const id=storeId(s.id||s.nazov),name=s.nazov||s.name||s.id;return `<button class="store-tab ${state.store===id?'active':''}" data-action="store" data-store="${esc(id)}" style="${storeStyle(id)}"><i class="store-dot"></i>${esc(name)}</button>`}).join('')}</div>`}
  function validityMeta(i){const from=i?.validFrom||i?.plati_od||i?.valid_from||'',to=i?.validTo||i?.plati_do||i?.valid_to||'',d=daysTo(to);if(to&&d!=null&&d<0)return {text:`Skončilo ${fmtDate(to)}`,cls:'expired'};if(to&&d===0)return {text:'Platí už len dnes',cls:'urgent'};if(to&&d===1)return {text:'Zostáva 1 deň',cls:'urgent'};if(to&&d===2)return {text:'Zostávajú 2 dni',cls:'urgent'};if(from&&to)return {text:`Platí ${fmtDate(from)} – ${fmtDate(to)}`,cls:''};if(to)return {text:`Platí do ${fmtDate(to)}`,cls:''};if(from)return {text:`Platí od ${fmtDate(from)}`,cls:''};return {text:'Platnosť neuvedená',cls:''}}

  function historySeries(i){const points=new Map();arr(i?.history).forEach(p=>{const date=String(p.datum||p.date||'').slice(0,10),price=num(p.cena_s_dph??p.price_with_vat??p.cena??p.price);if(/^\d{4}-\d{2}-\d{2}$/.test(date)&&price!=null)points.set(date,{date,price})});const generated=String(state.data?.raw?.generovane||'').slice(0,10),current=finalPrice(i);if(/^\d{4}-\d{2}-\d{2}$/.test(generated)&&current!=null)points.set(generated,{date:generated,price:current});return [...points.values()].sort((a,b)=>a.date.localeCompare(b.date)).slice(-16)}

  function sparklineHtml(i,large=false){const series=historySeries(i);if(series.length<2)return '';const values=series.map(p=>p.price),min=Math.min(...values),max=Math.max(...values),range=max-min||1,w=72,h=24,pad=2,coords=series.map((p,n)=>{const x=pad+(w-pad*2)*(n/(series.length-1)),y=max===min?h/2:pad+(h-pad*2)*(1-(p.price-min)/range);return {x,y}}),points=coords.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '),first=series[0],last=series.at(-1),change=last.price-first.price,trend=Math.abs(change)<.005?'bez zmeny':change<0?`klesla o ${fmtPrice(Math.abs(change))}`:`stúpla o ${fmtPrice(change)}`,label=`Zaznamenaná cena: ${trend} za ${series.length} ${measurementWord(series.length)}`;return `<span class="price-sparkline ${large?'large':''}" role="img" aria-label="${esc(label)}" title="${esc(label)}"><svg viewBox="0 0 ${w} ${h}" aria-hidden="true" focusable="false"><polyline points="${points}"></polyline><circle cx="${coords.at(-1).x.toFixed(1)}" cy="${coords.at(-1).y.toFixed(1)}" r="2"></circle></svg></span>`}

  function renderPromo(){let promos=arr(state.data.raw.promo);if(state.store!=='all')promos=promos.filter(p=>storeId(p.obchod||p.store)===state.store);if(!promos.length)return '';return `<section class="promo-section"><div class="section-head"><div><div class="section-kicker">Dôležité pred nákupom</div><h2>Špeciálne akcie</h2><p>Kupóny, bonusy a podmienky, ktoré menia výslednú cenu.</p></div></div><div class="promo-grid">${promos.map(p=>{const name=p.obchod||p.store,sid=storeId(name),v=validityMeta({validFrom:p.plati_od||p.valid_from,validTo:p.plati_do||p.valid_to}),store=state.data.stores.find(s=>storeId(s.id||s.nazov||s.name)===sid),flyerUrl=safeUrl(store?.letak_url||store?.flyer_url);return `<article class="promo-card ${v.cls==='expired'?'ended':''}" style="${storeStyle(name)}"><div class="promo-card-head">${storeLogo(name)}${flyerUrl?`<a class="promo-flyer-link" href="${esc(flyerUrl)}" target="_blank" rel="noopener noreferrer">Aktuálny leták ${svg('external')}</a>`:''}</div><strong>${esc(p.text||p.title)}</strong><div class="meta">${validityHtml({validFrom:p.plati_od||p.valid_from,validTo:p.plati_do||p.valid_to})}${p.podmienka?`<span class="condition-note">${esc(p.podmienka)}</span>`:''}</div></article>`}).join('')}</div></section>`}
  function renderRoute(){const plan=state.data.raw.plan;if(!plan||!arr(plan.zastavky).length)return '';return `<section class="panel insight-card"><div class="icon-wrap">${svg('cart')}</div><h2>Odporúčaný plán nákupu</h2><p>Routine navrhla poradie podľa platnosti akcií a odhadovanej úspory.</p><div class="route-list">${arr(plan.zastavky).map((z,i)=>`<div class="route-stop"><i class="route-no">${esc(z.poradie??i+1)}</i><div><strong>${esc(z.nazov)}</strong><span>${esc([z.den,z.poznamka].filter(Boolean).join(' · '))}</span></div><b class="route-price">${z.odhad_eur!=null?'~'+fmtPrice(z.odhad_eur):''}</b></div>`).join('')}</div>${safeUrl(plan.maps_url)?`<a class="primary-btn full" href="${esc(safeUrl(plan.maps_url))}" target="_blank" rel="noopener" style="margin-top:12px">Otvoriť trasu</a>`:''}</section>`}
  function renderOverview(){const items=state.items.filter(i=>state.store==='all'||i.storeId===state.store),real=items.filter(i=>i.verdict==='realna'),susp=items.filter(i=>i.verdict==='umela'),ending=items.filter(i=>{const d=daysTo(i.validTo);return d!=null&&d>=0&&d<=2});let top=state.top.filter(i=>state.store==='all'||i.storeId===state.store).slice(0,6);if(!top.length)top=items.slice().sort((a,b)=>(discountOf(b)||0)-(discountOf(a)||0)).slice(0,6);

  function renderList(){const totals=listTotals(),groups=groupShopping(),stores=sortedStores();return `${pageHeader('Môj nákupný zoznam','Pridávaj akcie aj vlastné položky, v obchode ich odškrtávaj. Zoznam si tento mobil zapamätá.')}

  function encodeSharePayload(value){const bytes=new TextEncoder().encode(JSON.stringify(value));let binary='';for(let i=0;i<bytes.length;i+=32768)binary+=String.fromCharCode(...bytes.subarray(i,i+32768));return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
  function decodeSharePayload(value){const padded=value.replace(/-/g,'+').replace(/_/g,'/')+'==='.slice((value.length+3)%4);const binary=atob(padded),bytes=Uint8Array.from(binary,c=>c.charCodeAt(0));return JSON.parse(new TextDecoder().decode(bytes))}
  async function copyText(text){if(navigator.clipboard?.writeText){await navigator.clipboard.writeText(text);return}const field=document.createElement('textarea');field.value=text;field.style.position='fixed';field.style.opacity='0';document.body.appendChild(field);field.select();document.execCommand('copy');field.remove()}
  async function shareList(){try{const payload=encodeSharePayload({v:1,items:shopping}),url=location.href.split('#')[0]+'#share='+payload;if(url.length>14000){showToast('Zoznam je na link príliš dlhý – použi JSON export');return}if(navigator.share){await navigator.share({title:'Môj nákupný zoznam',text:'Otvor link a načítaj môj nákupný zoznam.',url})}else{await copyText(url);showToast('Link na zoznam je skopírovaný')}}catch(e){if(e?.name!=='AbortError')showToast('Link sa nepodarilo vytvoriť')}}
  function consumeSharedLink(){if(!location.hash.startsWith('#share='))return;state.view='list';const cleanHash=location.pathname+location.search+'#list';try{const value=location.hash.slice(7);if(value.length>20000)throw new Error();const parsed=decodeSharePayload(value),items=Array.isArray(parsed)?parsed:parsed.items;if(!Array.isArray(items)||items.length>200)throw new Error();const clean=items.map(sanitizeListItem).filter(Boolean);if(!clean.length&&items.length)throw new Error();if(shopping.length&&!confirm('V tomto zariadení už máš nákupný zoznam. Chceš ho nahradiť zoznamom z linku?')){history.replaceState(null,'',cleanHash);return}shopping=clean;localStorage.setItem(LIST_KEY,JSON.stringify(shopping));history.replaceState(null,'',cleanHash);showToast('Zoznam z linku je načítaný')}catch{history.replaceState(null,'',cleanHash);showToast('Link neobsahuje platný nákupný zoznam')}}
  function exportList(){const blob=new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),items:shopping},null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`nakupny-zoznam-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);showToast('Zoznam bol exportovaný')}
  async function importList(file){try{const parsed=JSON.parse(await file.text()),items=Array.isArray(parsed)?parsed:parsed.items;if(!Array.isArray(items))throw new Error();const clean=items.map(sanitizeListItem).filter(Boolean);if(!clean.length&&items.length)throw new Error();shopping=clean;persistOnly();showToast('Zoznam bol importovaný')}catch{showToast('Tento súbor nie je platný zoznam')}}
  async function load(week){state.week=week;app.innerHTML='<div class="empty-state">Načítavam aktuálne akcie…</div>';try{const path=week==='latest'?'data/latest.json':`data/archive/${encodeURIComponent(week)}.json`,res=await fetch(path+'?v='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);const normalized=normalizeData(await res.json());state.data=normalized;state.items=normalized.items;state.top=normalized.top;render()}catch(e){app.innerHTML=`<div class="empty-state"><strong>Dáta sa nepodarilo načítať.</strong><br>${esc(e.message)}<br><button class="primary-btn" id="retry" style="margin-top:14px">Skúsiť znova</button></div>`;$('#retry')?.addEventListener('click',()=>load(week))}}
  async function loadArchive(){try{const r=await fetch('data/archive/index.json',{cache:'no-store'}),weeks=await r.json();if(!Array.isArray(weeks))return;weeks.slice().sort().reverse().forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=w;$('#week').appendChild(o)})}catch{}}
  document.addEventListener('click',e=>{const view=e.target.closest('[data-view]');if(view){switchView(view.dataset.view);return}const b=e.target.closest('[data-action]');if(!b)return;const a=b.dataset.action;if(a==='store'){state.store=b.dataset.store;switchView(state.view==='overview'?'overview':'deals',false)}else if(a==='filter'){state.filter=b.dataset.filter;render()}else if(a==='detail')openDetail(offerByKey(b.dataset.key));else if(a==='toggle-deal')toggleDeal(b.dataset.key);else if(a==='toggle-check'){const i=shopping.find(x=>x.id===b.dataset.id);if(i){i.checked=!i.checked;i.checkedAt=i.checked?new Date().toISOString():null;saveShopping()}}else if(a==='qty-up'||a==='qty-down'){const i=shopping.find(x=>x.id===b.dataset.id);if(i){i.quantity=Math.max(1,i.quantity+(a==='qty-up'?1:-1));saveShopping()}}else if(a==='remove-item'){shopping=shopping.filter(x=>x.id!==b.dataset.id);saveShopping();showToast('Položka odstránená')}else if(a==='remove-checked'){shopping=shopping.filter(x=>!x.checked);saveShopping();showToast('Nákup dokončený')}else if(a==='uncheck-all'){shopping.forEach(x=>{x.checked=false;x.checkedAt=null});saveShopping()}else if(a==='share')shareList();else if(a==='export')exportList();else if(a==='import')$('#import-file').click()});
  app.addEventListener('submit',e=>{if(e.target.id!=='manual-form')return;e.preventDefault();const fd=new FormData(e.target),name=String(fd.get('name')||'').trim();if(!name)return;shopping.push({id:uid(),source:'manual',offerId:'',productId:null,name,amount:null,store:String(fd.get('store')||'')||null,price:null,originalPrice:null,unitPrice:null,image:null,quantity:Math.max(1,Number(fd.get('quantity'))||1),checked:false,addedAt:new Date().toISOString(),checkedAt:null});saveShopping();showToast('Vlastná položka pridaná')});
  $('#sort')?.addEventListener('change',()=>{});
  app.addEventListener('change',e=>{if(e.target.id==='sort'){state.sort=e.target.value;render()}});
  let searchTimer;$('#search').addEventListener('input',e=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>{state.query=e.target.value.trim();if(state.query&&state.view!=='deals')switchView('deals');else render()},120)});
  $('#week').addEventListener('change',e=>load(e.target.value));
  $('#sheet-close').addEventListener('click',closeDetail);$('#modal-backdrop').addEventListener('click',closeDetail);document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});
  $('#import-file').addEventListener('change',e=>{const f=e.target.files?.[0];if(f)importList(f);e.target.value='' });
  function handleLocationHash(){if(location.hash.startsWith('#share=')){consumeSharedLink();updateNav();if(state.data)render();return}const v=location.hash.slice(1);if(['overview','deals','list'].includes(v)&&v!==state.view){state.view=v;render();updateNav()}}
  addEventListener('hashchange',handleLocationHash);
  if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
  consumeSharedLink();updateNav();loadArchive();load('latest');
})();
</script>
</body>
