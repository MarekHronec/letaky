<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#345344">
  <meta name="description" content="Akcie z letákov bez marketingovej hmly, s nákupným zoznamom do mobilu.">
  <meta name="color-scheme" content="light">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; connect-src 'self' https://*.supabase.co; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'self'">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/app-icon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>Letákový prehľad</title>
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <a class="brand" href="#overview" aria-label="Letákový prehľad – domov">
      <span class="brand-mark" data-icon="tag"></span>
      <span>Letákový<br>prehľad</span>
    </a>
    <nav class="side-nav" aria-label="Hlavná navigácia">
      <button class="nav-btn" data-view="overview"><span data-icon="home"></span>Prehľad</button>
      <button class="nav-btn" data-view="deals"><span data-icon="tag"></span>Všetky akcie</button>
      <button class="nav-btn" data-view="list"><span data-icon="list"></span>Môj zoznam <span class="nav-badge list-count" hidden>0</span></button>
      <button class="nav-btn" data-view="legislativa"><span data-icon="doc"></span>Legislatíva</button>
    </nav>
    <div class="side-note">
      <strong>Lokálne s voliteľným syncom</strong>
      Zoznam sa ukladá v tomto zariadení; po prihlásení sa synchronizuje medzi tvojimi zariadeniami.
    </div>
  </aside>

  <div class="workspace">
    <header class="topbar">
      <div class="mobile-brand"><span class="brand-mark" data-icon="tag"></span>Letákový prehľad</div>
      <label class="searchbox">
        <span data-icon="search"></span>
        <span class="sr-only">Hľadať produkt alebo obchod</span>
        <input id="search" type="search" placeholder="Hľadať produkt alebo obchod…" autocomplete="off">
      </label>
      <select class="week-select" id="week" aria-label="Výber týždňa">
        <option value="latest">Tento týždeň</option>
      </select>
      <button class="header-list" type="button" data-view="list">
        <span data-icon="list"></span>Môj zoznam <span class="count list-count">0</span>
      </button>
      <button class="topbar-profile" type="button" data-view="profil" aria-label="Profil a nastavenia" title="Profil a nastavenia">
        <span data-icon="user"></span>
      </button>
    </header>
    <main class="main" id="app">
      <div class="empty-state">Načítavam aktuálne akcie…</div>
    </main>
  </div>
</div>

<nav class="bottom-nav" aria-label="Mobilná navigácia">
  <button class="nav-btn" data-view="overview"><span data-icon="home"></span>Prehľad</button>
  <button class="nav-btn" data-view="deals"><span data-icon="tag"></span>Akcie</button>
  <button class="nav-btn" data-view="list"><span data-icon="list"></span>Zoznam <span class="nav-badge list-count" hidden>0</span></button>
  <button class="nav-btn" data-view="legislativa"><span data-icon="doc"></span>Zákony</button>
</nav>

<div class="modal-backdrop" id="modal-backdrop"></div>

<aside class="detail-sheet" id="detail-sheet" role="dialog" aria-modal="true" aria-label="Detail produktu" aria-hidden="true" inert>
  <div class="sheet-head">
    <span data-icon="tag"></span>
    <strong>Detail akcie</strong>
    <button class="sheet-close" id="sheet-close" aria-label="Zavrieť detail"><span data-icon="close"></span></button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</aside>

<input hidden id="import-file" type="file" accept="application/json,.json">
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="update-banner" id="update-banner" hidden>
  <span>Je dostupná nová verzia aplikácie.</span>
  <button type="button" id="update-reload">Obnoviť</button>
</div>
<div class="sr-only" id="live" role="status" aria-live="polite"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
